name: C# No Regions Lint

on:
  push:
    branches:
      - main
    paths:
      - "**.cs"
      - "scripts/lint-no-regions.ps1"
      - ".github/workflows/csharp-no-regions-lint.yml"
  pull_request:
    paths:
      - "**.cs"
      - "scripts/lint-no-regions.ps1"
      - ".github/workflows/csharp-no-regions-lint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-no-regions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: "Lint C# files for #region directives"
        shell: pwsh
        run: ./scripts/lint-no-regions.ps1 -VerboseOutput
