name: Validate Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "*.md"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".gitignore"
      - "scripts/comment-stripping.ps1"
      - "scripts/lint-doc-links.ps1"
      - "scripts/run-doc-link-lint.js"
      - "scripts/tests/test-lint-doc-links.ps1"
      - "scripts/lint-gitignore-docs.ps1"
      - "scripts/tests/test-gitignore-docs.ps1"
      - "scripts/validate-github-pages-css.sh"
      - "scripts/check-code-fence-syntax.sh"
      - ".github/workflows/validate-docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".gitignore"
      - "scripts/comment-stripping.ps1"
      - "scripts/lint-doc-links.ps1"
      - "scripts/run-doc-link-lint.js"
      - "scripts/tests/test-lint-doc-links.ps1"
      - "scripts/lint-gitignore-docs.ps1"
      - "scripts/tests/test-gitignore-docs.ps1"
      - "scripts/validate-github-pages-css.sh"
      - "scripts/check-code-fence-syntax.sh"
      - ".github/workflows/validate-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-links:
    name: Validate Internal Links
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check internal markdown links exist
        shell: pwsh
        run: ./scripts/lint-doc-links.ps1 -Mode Targets -VerboseOutput

  validate-link-format:
    name: Validate Link Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check markdown link format
        shell: pwsh
        run: ./scripts/lint-doc-links.ps1 -Mode Format -VerboseOutput

  build-mkdocs-test:
    name: Build MkDocs Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Verify build output
        run: |
          if [[ -d "site" ]]; then
            echo "MkDocs site built successfully"
            echo "Site contents:"
            find site -type f | head -20
          else
            echo "MkDocs build did not produce site directory"
            exit 1
          fi

  validate-css-layout:
    name: Validate CSS Layout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate GitHub Pages CSS
        run: bash scripts/validate-github-pages-css.sh

  code-fence-syntax:
    name: Code Fence Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check code fence syntax
        id: check-fences
        shell: bash
        run: |
          if bash scripts/check-code-fence-syntax.sh 2>&1 | tee /tmp/fence-output.txt; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Report to GitHub Step Summary
        if: always()
        run: |
          {
            echo "## Code Fence Syntax Check"
            echo ""
            if [ "${{ steps.check-fences.outputs.status }}" = "success" ]; then
              echo ":white_check_mark: **All code fences have valid syntax**"
            else
              echo ":x: **Code fence syntax issues found**"
              echo ""
              echo "MkDocs/GitHub Pages does not support comma-separated attributes in code fences."
              echo ""
              echo "\`\`\`"
              cat /tmp/fence-output.txt
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if issues found
        if: steps.check-fences.outputs.status == 'failure'
        run: exit 1

  gitignore-docs-safety:
    name: Gitignore Docs Safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Test gitignore docs linter
        shell: pwsh
        run: ./scripts/tests/test-gitignore-docs.ps1 -VerboseOutput

      - name: Validate no docs files are gitignored
        shell: pwsh
        run: ./scripts/lint-gitignore-docs.ps1 -VerboseOutput
