name: License Header Lint

on:
  push:
    branches:
      - main
    paths:
      - "**.cs"
      - "scripts/lint-license-headers.ps1"
      - ".github/workflows/license-header-lint.yml"
  pull_request:
    paths:
      - "**.cs"
      - "scripts/lint-license-headers.ps1"
      - ".github/workflows/license-header-lint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-license-headers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check MIT license headers
        shell: pwsh
        run: ./scripts/lint-license-headers.ps1 -VerboseOutput
