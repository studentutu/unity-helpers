name: Validate NPM Package

on:
  push:
    branches:
      - main
    paths:
      - "Runtime/**"
      - "Editor/**"
      - "Samples~/**"
      - "Shaders/**"
      - "Styles/**"
      - "URP/**"
      - "package.json"
      - ".npmignore"
      - "scripts/validate-npm-package.ps1"
      - ".github/workflows/validate-npm-package.yml"
  pull_request:
    paths:
      - "Runtime/**"
      - "Editor/**"
      - "Samples~/**"
      - "Shaders/**"
      - "Styles/**"
      - "URP/**"
      - "package.json"
      - ".npmignore"
      - "scripts/validate-npm-package.ps1"
      - ".github/workflows/validate-npm-package.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-npm-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "20"

      - name: Validate NPM package
        shell: pwsh
        run: ./scripts/validate-npm-package.ps1 -VerboseOutput
