name: Release Tag

on:
  push:
    paths:
      - "package.json"
      - "CHANGELOG.md"

permissions:
  contents: read

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Tag release commit
    if: >
      (github.repository == 'wallstop/unity-helpers' || github.repository == 'Ambiguous-Interactive/unity-helpers') &&
      github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Detect release commit
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(jq -r '.version // empty' package.json)"
          if ! printf '%s\n' "${version}" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "::error::package.json version '${version}' is not strict X.Y.Z semver."
            exit 1
          fi

          subject="$(git log -1 --format=%s)"
          escaped_version="${version//./\\.}"
          if [ "${subject}" != "release: ${version}" ] \
            && ! printf '%s\n' "${subject}" | grep -Eq "^release: ${escaped_version} \(#[0-9]+\)$"; then
            # shellcheck disable=SC2016 # PowerShell $env:CHANGELOG_VERSION is expanded by pwsh, not bash.
            if CHANGELOG_VERSION="${version}" pwsh -NoProfile -Command '
              $ErrorActionPreference = "Stop"
              . ./scripts/release-tools/release-helpers.ps1
              $content = [System.IO.File]::ReadAllText("CHANGELOG.md")
              [void](Get-ChangelogSection -Content $content -Version $env:CHANGELOG_VERSION)
            '; then
              if git show-ref --verify --quiet "refs/tags/${version}"; then
                echo "Head commit is not a release commit; version ${version} is already tagged; nothing to do."
              else
                message="Version ${version} is untagged and CHANGELOG.md documents it, "
                message+="but head subject '${subject}' is not 'release: ${version}'. "
                message+="Squash-merge release PRs with the default title, or tag this commit manually."
                echo "::error::${message}"
                exit 1
              fi
            else
              echo "Head commit is not a release commit; nothing to do."
            fi
            echo "proceed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # shellcheck disable=SC2016 # PowerShell $env:CHANGELOG_VERSION is expanded by pwsh, not bash.
          if ! CHANGELOG_VERSION="${version}" pwsh -NoProfile -Command '
            $ErrorActionPreference = "Stop"
            . ./scripts/release-tools/release-helpers.ps1
            $content = [System.IO.File]::ReadAllText("CHANGELOG.md")
            [void](Get-ChangelogSection -Content $content -Version $env:CHANGELOG_VERSION)
          '; then
            echo "::error::Release commit for ${version} has no CHANGELOG.md section with release-note content."
            exit 1
          fi

          set +e
          tag_lookup_output="$(gh api -i "repos/${GITHUB_REPOSITORY}/git/ref/tags/${version}" 2>&1)"
          tag_lookup_exit=$?
          set -e
          if [ "${tag_lookup_exit}" -eq 0 ]; then
            git fetch --force --tags origin "refs/tags/${version}:refs/tags/${version}" >/dev/null
            tag_target="$(git rev-list -n 1 "${version}")"
            if [ "${tag_target}" = "${GITHUB_SHA}" ]; then
              echo "Tag ${version} already points at this release commit; nothing to do."
              echo "proceed=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "::error::Tag ${version} already exists at ${tag_target}, not release commit ${GITHUB_SHA}."
            exit 1
          fi
          if ! printf '%s\n' "${tag_lookup_output}" | grep -E '(^HTTP/[0-9.]+ 404( |$)|"status":"404")' >/dev/null; then
            echo "::error::Failed to check whether tag ${version} already exists."
            printf '%s\n' "${tag_lookup_output}"
            exit "${tag_lookup_exit}"
          fi

          {
            echo "proceed=true"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check auto-commit GitHub App credentials
        if: ${{ steps.detect.outputs.proceed == 'true' }}
        env:
          AUTO_COMMIT_APP_ID: ${{ secrets.AUTO_COMMIT_APP_ID }}
          AUTO_COMMIT_APP_PRIVATE_KEY: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AUTO_COMMIT_APP_ID:-}" ] && [ -n "${AUTO_COMMIT_APP_PRIVATE_KEY:-}" ]; then
            exit 0
          fi
          echo "::error::AUTO_COMMIT_APP_ID and AUTO_COMMIT_APP_PRIVATE_KEY are required to push release tags with a token that triggers Release Publish."
          exit 1

      - name: Generate auto-commit GitHub App token
        id: app-token
        if: ${{ steps.detect.outputs.proceed == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTO_COMMIT_APP_ID }}
          private-key: ${{ secrets.AUTO_COMMIT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Create and push annotated tag
        if: ${{ steps.detect.outputs.proceed == 'true' }}
        env:
          GH_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Release ${VERSION}" "${GITHUB_SHA}"
          auth_header="$(printf 'x-access-token:%s' "${GH_PUSH_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "refs/tags/${VERSION}"
          echo "::notice::Pushed release tag ${VERSION}."
