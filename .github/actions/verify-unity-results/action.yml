name: Verify Unity tests actually ran
# cspell:ignore ieq IPC
description: >-
  Fail unless an NUnit results.xml under results-dir reports total > 0 and
  failed = 0. When XML is absent, list provisioning diagnostics and scan the
  Unity log for catastrophic compile-time failures.
inputs:
  results-dir:
    description: "Directory the Unity runner wrote the NUnit results XML into."
    required: true
  label:
    description: "Human label used in log lines and annotations."
    required: false
    default: "Unity tests"
  expected-empty:
    description: >-
      Set to 'true' by the caller when the unity-helpers test-assembly list
      resolved EMPTY for this target and the Unity run was intentionally
      skipped. The verifier then treats the absence of results as an expected
      skip (notice + success) instead of failing with "tests did not run".
    required: false
    default: "false"
runs:
  using: composite
  steps:
    # Skip on cancellation so this step does not race against the user's
    # cancel and emit a misleading "tests did not run" error annotation
    # when in fact the run was cancelled. Note: this is a STEP-level
    # condition; the workflow-level "Verify tests actually ran" entry that
    # invokes this composite should use the SAME idiom so the composite is
    # not invoked at all on cancel, but the inner guard belt-and-suspenders
    # protects against a future workflow forgetting the outer condition.
    - name: Verify tests actually ran
      if: ${{ !cancelled() }}
      shell: pwsh
      # Pass EVERY caller-supplied value through env: (NOT inline ${{ }} expansion
      # in the run script). A run: block that contains even one ${{ }} interpolation
      # is compiled by GitHub as a single template expression, and THIS block's body
      # is ~26 KB -- well over the hard 21,000-character per-expression limit, which
      # made every Unity leg fail to start with "Exceeded max expression length 21000"
      # (Line 38 = this run:). Reading the inputs from $env:* keeps the run body a
      # plain literal (no template compilation, no length limit) and is also safer:
      # a label/dir containing a quote can no longer break the script. scripts/lint-
      # workflow-run-expression-length.ps1 enforces this for every action/workflow
      # run block.
      env:
        UH_EXPECTED_EMPTY: ${{ inputs.expected-empty }}
        UH_RESULTS_DIR: ${{ inputs.results-dir }}
        UH_LABEL: ${{ inputs.label }}
      run: |
        $dir = $env:UH_RESULTS_DIR
        $label = $env:UH_LABEL
        # When the caller resolved an empty unity-helpers test-assembly list for
        # this target it skips the Unity run entirely (see compute-unity-assemblies
        # and unity-tests.yml). There are then no results to verify, so treat it
        # as an explicit success instead of a "tests did not run" failure. Read
        # the signal from the environment via an env: mapping above (NOT an inline
        # workflow-expression expansion in this run script) so the spawn-based
        # verifier tests, which only substitute results-dir/label, observe an
        # unset var and exercise the normal verification path.
        if ($env:UH_EXPECTED_EMPTY -eq 'true') {
          Write-Host "::notice::No unity-helpers test assemblies were selected for $label; the Unity run was skipped, so there is nothing to verify."
          exit 0
        }
        function Write-ProvisioningDiagnosticsHint {
          param([Parameter(Mandatory = $true)][string]$ResultsDir)

          $roots = New-Object System.Collections.Generic.List[string]
          foreach ($candidate in @($ResultsDir, '.artifacts', 'artifact')) {
            if ($candidate -and (Test-Path -LiteralPath $candidate)) {
              $full = (Resolve-Path -LiteralPath $candidate).Path
              if (-not $roots.Contains($full)) {
                $roots.Add($full)
              }
            }
          }

          $dirs = New-Object System.Collections.Generic.List[string]
          foreach ($root in $roots) {
            if ((Split-Path -Leaf $root) -ieq 'provisioning') {
              if (-not $dirs.Contains($root)) {
                $dirs.Add($root)
              }
            }

            $direct = Join-Path $root 'provisioning'
            if ((Test-Path -LiteralPath $direct) -and -not $dirs.Contains($direct)) {
              $dirs.Add((Resolve-Path -LiteralPath $direct).Path)
            }

            Get-ChildItem -LiteralPath $root -Directory -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -ieq 'provisioning' } |
              ForEach-Object {
                if (-not $dirs.Contains($_.FullName)) {
                  $dirs.Add($_.FullName)
                }
              }
          }

          if ($dirs.Count -lt 1) {
            Write-Host "::warning::No provisioning diagnostics directory found under $ResultsDir, .artifacts, or artifact."
            return
          }

          Write-Host "::group::Provisioning diagnostics files"
          foreach ($diagnosticsDir in $dirs) {
            Write-Host "Provisioning diagnostics directory: $diagnosticsDir"
            $files = @(
              Get-ChildItem -LiteralPath $diagnosticsDir -File -Recurse -ErrorAction SilentlyContinue |
                Sort-Object FullName
            )
            if ($files.Count -lt 1) {
              Write-Host "- (empty)"
              continue
            }

            foreach ($file in $files) {
              Write-Host "- $($file.FullName)"
            }

            $summary = $files |
              Where-Object { $_.Name -match '(?i)summary' } |
              Select-Object -First 1
            if ($summary) {
              Write-Host "::notice::Provisioning summary: $($summary.FullName)"
              try {
                $summaryJson = Get-Content -LiteralPath $summary.FullName -Raw | ConvertFrom-Json
                $classification = if ($summaryJson.finalClassification) {
                  [string]$summaryJson.finalClassification
                } else {
                  '(missing)'
                }
                $provisioningProfile = if ($summaryJson.provisioningProfile) {
                  [string]$summaryJson.provisioningProfile
                } else {
                  '(missing)'
                }
                Write-Host "::notice::Provisioning summary classification=$classification profile=$provisioningProfile"
                if ($env:GITHUB_STEP_SUMMARY) {
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- Provisioning summary: ``" + $summary.FullName + "``")
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- Provisioning classification: ``" + $classification + "`` (profile ``" + $provisioningProfile + "``)")
                }
                if ($classification -ne 'success' -and $classification -ne '(missing)') {
                  $missingModules = @()
                  if ($summaryJson.requiredModulePresence) {
                    foreach ($property in @($summaryJson.requiredModulePresence.PSObject.Properties)) {
                      if ($property.Value -eq $false) {
                        $missingModules += [string]$property.Name
                      }
                    }
                  }
                  $missingText = if ($missingModules.Count -gt 0) {
                    " missingModules=$($missingModules -join ',')"
                  } else {
                    ""
                  }
                  Write-Host "::error::Provisioning failed before Unity results verification: classification=$classification profile=$provisioningProfile summary=$($summary.FullName)$missingText"
                }
              } catch {
                Write-Host "::notice::Provisioning summary metadata could not be parsed: $($_.Exception.Message)"
              }
            }
          }
          Write-Host "::endgroup::"
        }

        function Add-UnityDiagnosticLogFile {
          param(
            [Parameter(Mandatory = $true)]$LogFiles,
            [Parameter(Mandatory = $true)]$Seen,
            [string]$Path
          )

          if (-not $Path -or -not (Test-Path -LiteralPath $Path -PathType Leaf)) {
            return
          }

          try {
            $fullPath = (Resolve-Path -LiteralPath $Path -ErrorAction Stop).Path
          } catch {
            return
          }

          if ($Seen.Add($fullPath)) {
            $LogFiles.Add($fullPath)
          }
        }

        function Get-UnityDiagnosticLogFiles {
          param([string]$ResultsDir)

          $logFiles = New-Object System.Collections.Generic.List[string]
          $seen = New-Object 'System.Collections.Generic.HashSet[string]' ([StringComparer]::OrdinalIgnoreCase)
          if (-not $ResultsDir) {
            return @($logFiles)
          }

          Add-UnityDiagnosticLogFile `
            -LogFiles $logFiles `
            -Seen $seen `
            -Path (Join-Path $ResultsDir 'unity.log')

          if (Test-Path -LiteralPath $ResultsDir -PathType Container) {
            Get-ChildItem -LiteralPath $ResultsDir -File -Recurse -Filter '*.log' -ErrorAction SilentlyContinue |
              Sort-Object FullName |
              ForEach-Object {
                Add-UnityDiagnosticLogFile `
                  -LogFiles $logFiles `
                  -Seen $seen `
                  -Path $_.FullName
              }
          }

          return @($logFiles)
        }

        # CLASS-OF-ISSUE DIAGNOSTIC: when results.xml is missing, the operator's
        # next question is "WHY did Unity not produce results?". The most common
        # silent-killer answers are catastrophic compile-time errors -- the editor
        # exits before running tests at all, leaving no NUnit XML. Surface these
        # patterns BEFORE the generic "no results.xml" message so the operator
        # sees the actual root cause in the GitHub error summary.
        #
        # Patterns covered:
        #   - PrecompiledAssemblyException -- "Multiple precompiled assemblies
        #     with the same name" (the analyzer-DLL duplicate that motivated this
        #     diagnostic; the runtime auto-copy that caused it has been removed).
        #   - CompilationFailedException -- generic compile-failure path.
        #   - error CS\d+ -- compiler errors (CS0246, CS0103, CS0117, etc).
        #   - warning CS8032 -- "An instance of analyzer cannot be created"
        #     (analyzer failed to instantiate; same class of issue).
        #   - WaitForEndOfFrame "not evoked in batchmode" -- a [UnityTest] (or a
        #     coroutine it drives) yielded WaitForEndOfFrame, which never resumes under
        #     -batchmode -nographics; the PlayMode run stalls and writes a misleading
        #     total=0 results.xml. Surfaced so the operator sees the real cause instead
        #     of the generic "unexpected log" trail. scripts/lint-tests.ps1 UNH012 is
        #     the pre-Unity guard. Keep in sync with run-ci-tests.ps1 CatastrophicPatterns.
        function Write-UnityCatastrophicPatternHits {
          param([Parameter(Mandatory = $true)][string]$ResultsDir)

          # Catastrophic patterns come from the single source of truth shared with
          # run-ci-tests.ps1 and dump-unity-log-tail (kept honest by
          # scripts/tests/test-catastrophic-pattern-sync.ps1). Do NOT inline a copy here.
          $repoRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          . (Join-Path $repoRoot 'scripts/unity/lib/catastrophic-patterns.ps1')
          $patterns = @(Get-CatastrophicPatterns)

          $logFiles = @(Get-UnityDiagnosticLogFiles -ResultsDir $ResultsDir)

          if ($logFiles.Count -lt 1) {
            return
          }

          $maxPerPattern = 5
          foreach ($entry in $patterns) {
            $hits = New-Object System.Collections.Generic.List[object]
            foreach ($logFile in $logFiles) {
              try {
                if ($entry.UseSimple) {
                  Select-String -LiteralPath $logFile -SimpleMatch -Pattern $entry.Pattern -ErrorAction SilentlyContinue |
                    ForEach-Object {
                      if ($hits.Count -lt $maxPerPattern) {
                        $hits.Add($_)
                      }
                    }
                } else {
                  Select-String -LiteralPath $logFile -Pattern $entry.Pattern -ErrorAction SilentlyContinue |
                    ForEach-Object {
                      if ($hits.Count -lt $maxPerPattern) {
                        $hits.Add($_)
                      }
                    }
                }
              } catch {
                # Best-effort; never throw from the diagnostic helper.
              }
              if ($hits.Count -ge $maxPerPattern) {
                break
              }
            }

            if ($hits.Count -gt 0) {
              Write-Host "::group::Catastrophic pattern: $($entry.Label)"
              foreach ($hit in $hits) {
                $line = $hit.Line.Trim()
                Write-Host "::error::Pattern detected -- $($entry.Label):: $line"
                Write-Host "  $($hit.Path):$($hit.LineNumber): $line"
              }
              Write-Host "::endgroup::"
            }
          }
        }

        # DIAGNOSTIC: when results.xml reports failures, name WHICH tests failed
        # and print their assertion messages. The aggregate "failed=N" count is
        # not actionable on its own (a real 2021.3 PlayMode run failed 1 of 697
        # tests and the logs never named it). Emits a single-line ::error::
        # annotation per failed test plus a ::group:: console block with the full
        # multi-line message + stack trace. Two classes are enumerated:
        #   (1) failed leaf cases: //test-case[@result='Failed'], and
        #   (2) failed suites with their OWN direct <failure> child (the
        #       OneTimeSetUp/OneTimeTearDown shape, e.g. a [OneTimeTearDown]
        #       Assert.Fail), which manifest as a failed SUITE. Reported even when
        #       the suite also has a failed child case, so the teardown's own
        #       message is not lost; fullname de-dup keeps it distinct from the
        #       child cases. An aggregate-only suite (no direct <failure>) is
        #       skipped.
        # De-duplicated by fullname, capped at the first 50 (with a truncation
        # notice), and best-effort (never throws -- a diagnostic must not mask
        # the real failure below). Attribute reads use XmlElement.GetAttribute
        # (returns '' when absent, never throws) so behavior stays synchronized
        # with run-ci-tests.ps1 even though this script does not set StrictMode.
        function ConvertTo-SingleLineDiagnostic {
          param([string]$Text)
          if (-not $Text) {
            return ''
          }
          return (($Text -replace '\s+', ' ').Trim())
        }
        function Write-UnityPackageManagerFailureHints {
          param([Parameter(Mandatory = $true)][string]$ResultsDir)

          $patterns = @(
            'Cancelled resolving packages',
            'Failed to resolve packages:\s+operation cancelled',
            'IPCStream \(Upm-[^)]+\): IPC stream failed to read'
          )
          $logFiles = @(Get-UnityDiagnosticLogFiles -ResultsDir $ResultsDir)

          foreach ($logFile in $logFiles) {
            try {
              $hit = Select-String -LiteralPath $logFile -Pattern $patterns -ErrorAction SilentlyContinue |
                Select-Object -First 1
              if ($hit) {
                $line = ConvertTo-SingleLineDiagnostic -Text $hit.Line
                Write-Host "::error::Unity Package Manager canceled package resolution before tests started: $line"
                Write-Host "  $($hit.Path):$($hit.LineNumber): $line"
                return
              }
            } catch {
              # Best-effort diagnostic only.
            }
          }
        }
        # Token holder for the ::stop-commands::<token> ... ::<token>:: fence that
        # wraps caller-controlled raw multi-line dumps (NUnit
        # <message>/<stack-trace>). GitHub parses every stdout line for
        # `::command::` directives; fencing the raw body disables that processing
        # so an assertion message containing a line like `::error file=...::` or
        # `::set-output name=x::` cannot inject a spurious workflow command. The
        # token is NOT a fixed literal: a crafted message containing the exact
        # `::<literal>::` close line could otherwise end the fence early and
        # re-enable injection. A FRESH random GUID token is generated per dump
        # via New-WorkflowCommandStopToken (mirroring GitHub's own @actions/core
        # random per-invocation delimiter) and reused for the open and close.
        # Kept in sync with run-ci-tests.ps1's matching fence scheme.
        function New-WorkflowCommandStopToken {
          return ('uh-stop-commands-{0}' -f [guid]::NewGuid().ToString('N'))
        }
        # Resolve a node's display name via XmlElement.GetAttribute (returns ''
        # for an ABSENT attribute, never throws) -- kept synchronized with
        # run-ci-tests.ps1's StrictMode-safe Get-NUnitNodeFullName. Prefers
        # fullname, then name, then a '(unnamed test)' fallback.
        function Get-NUnitNodeFullName {
          param([Parameter(Mandatory = $true)]$Node)
          $fullName = $Node.GetAttribute('fullname')
          if (-not $fullName) {
            $fullName = $Node.GetAttribute('name')
          }
          if (-not $fullName) {
            $fullName = '(unnamed test)'
          }
          return $fullName
        }
        function Write-FailedTestAnnotations {
          param(
            [Parameter(Mandatory = $true)]$Doc,
            [Parameter(Mandatory = $true)][string]$Label,
            [int]$MaxFailures = 50
          )

          try {
            $failedCases = @($Doc.SelectNodes("//test-case[@result='Failed']"))
            $failedSuites = @($Doc.SelectNodes("//test-suite[@result='Failed']"))
            # Report a failed suite on its OWN merits whenever it carries a
            # direct <failure> child (even if it also has a failed descendant
            # case) so a [OneTimeTearDown] message is not lost. fullname de-dup
            # keeps it distinct from its child cases; an aggregate-only suite
            # (no direct <failure>) is skipped.
            $ownFailureSuites = @(
              foreach ($suite in $failedSuites) {
                $directFailure = $suite.SelectSingleNode('failure')
                if ($directFailure) {
                  $suite
                }
              }
            )
            $failedNodes = @($failedCases) + @($ownFailureSuites)
            if ($failedNodes.Count -lt 1) {
              return
            }

            $seen = New-Object 'System.Collections.Generic.HashSet[string]'
            $uniqueNodes = New-Object 'System.Collections.Generic.List[object]'
            foreach ($node in $failedNodes) {
              $fullName = Get-NUnitNodeFullName -Node $node
              if ($seen.Add($fullName)) {
                $uniqueNodes.Add($node)
              }
            }

            $totalFailed = $uniqueNodes.Count
            $shown = @($uniqueNodes | Select-Object -First $MaxFailures)
            foreach ($node in $shown) {
              $fullName = Get-NUnitNodeFullName -Node $node
              $failureNode = $node.SelectSingleNode('failure')
              $message = ''
              $stackTrace = ''
              if ($failureNode) {
                $messageNode = $failureNode.SelectSingleNode('message')
                if ($messageNode) {
                  $message = $messageNode.InnerText
                }
                $stackNode = $failureNode.SelectSingleNode('stack-trace')
                if ($stackNode) {
                  $stackTrace = $stackNode.InnerText
                }
              }
              $firstLine = ConvertTo-SingleLineDiagnostic -Text $message
              # The single-line ::error:: annotation stays OUTSIDE the fence so
              # GitHub still processes it; it is already flattened to one line.
              Write-Host "::error::${Label} failed test: $fullName -- $firstLine"
              Write-Host "::group::Failed test: $fullName"
              # SECURITY: the raw NUnit <message>/<stack-trace> are
              # caller-controlled; GitHub parses every stdout line for
              # `::command::` directives. Fence the raw multi-line dump with
              # ::stop-commands::<token> ... ::<token>:: so an injected line like
              # `::set-output name=x::` is neutralized. The token is a FRESH
              # random GUID per dump (never a fixed literal) so a crafted message
              # containing the exact `::<literal>::` close line cannot end the
              # fence early. The ::group::/::endgroup:: markers stay OUTSIDE the
              # fence so they are still processed.
              $stopToken = New-WorkflowCommandStopToken
              Write-Host "::stop-commands::$stopToken"
              if ($message) {
                Write-Host "Message:"
                Write-Host $message
              } else {
                Write-Host "Message: (none recorded)"
              }
              if ($stackTrace) {
                Write-Host "Stack trace:"
                Write-Host $stackTrace
              }
              Write-Host "::$stopToken::"
              Write-Host "::endgroup::"
            }

            if ($totalFailed -gt $shown.Count) {
              $omitted = $totalFailed - $shown.Count
              Write-Host "::notice::${Label}: $omitted additional failed test(s) not shown (showing first $($shown.Count) of $totalFailed)."
            }
          } catch {
            Write-Host "::warning::Could not enumerate failed tests for ${Label}: $($_.Exception.Message)"
          }
        }
        function Get-FailedNodeCount {
          param([Parameter(Mandatory = $true)]$Doc)

          try {
            $failedCases = @($Doc.SelectNodes("//test-case[@result='Failed']"))
            $failedSuitesWithOwnFailure = @($Doc.SelectNodes("//test-suite[@result='Failed'][failure]"))
            return $failedCases.Count + $failedSuitesWithOwnFailure.Count
          } catch {
            return 0
          }
        }
        function Write-UnityExecutionSymptomDiagnostics {
          param(
            [Parameter(Mandatory = $true)][string]$ResultsDir,
            [Parameter(Mandatory = $true)][string]$Label,
            [int]$MaxLines = 80
          )

          $patterns = @(
            'Files generated by test without cleanup\.',
            'Found \d+ new files\.',
            '^\s+Assets[\\/]',
            'IgnoreFailingMessages:false',
            'Unhandled log message',
            'UnexpectedLogMessageException',
            'CleanupVerificationTask',
            'Test run completed\. Exiting with code 2',
            'One or more tests failed',
            'Unable to find (child|sibling|parent) component',
            'Can''t add ''.*'' to .* because',
            'EditorWindow\.ShowUtility',
            'd3d12: Unrecoverable GPU device error',
            'No graphic device is available to initialize the view',
            'AddCursorRect called outside an editor OnGUI'
          )
          $hits = New-Object 'System.Collections.Generic.List[object]'
          $sawCleanupLeak = $false
          $sawUnexpectedLog = $false
          $sawNativeWindowFailure = $false

          foreach ($logFile in @(Get-UnityDiagnosticLogFiles -ResultsDir $ResultsDir)) {
            try {
              foreach ($hit in @(Select-String -LiteralPath $logFile -Pattern $patterns -ErrorAction SilentlyContinue)) {
                if ($hits.Count -lt $MaxLines) {
                  $hits.Add($hit)
                }

                if ($hit.Line -match 'Files generated by test without cleanup\.') {
                  $sawCleanupLeak = $true
                }
                if ($hit.Line -match 'Unhandled log message' -or $hit.Line -match 'UnexpectedLogMessageException') {
                  $sawUnexpectedLog = $true
                }
                if ($hit.Line -match 'EditorWindow\.ShowUtility' -or $hit.Line -match 'd3d12: Unrecoverable GPU device error') {
                  $sawNativeWindowFailure = $true
                }
              }
            } catch {
              # Best-effort diagnostic only.
            }
          }

          if ($hits.Count -lt 1) {
            return
          }

          Write-Host "::group::Unity execution symptom diagnostics ($Label)"
          foreach ($hit in $hits) {
            $line = $hit.Line.Trim()
            Write-Host ("  {0}:{1}: {2}" -f $hit.Path, $hit.LineNumber, $line)
          }
          Write-Host "::endgroup::"

          if ($sawCleanupLeak) {
            Write-Host "::error::Unity cleanup verification failed for ${Label}: one or more tests left generated files under Assets. See the generated-file lines above."
          }
          if ($sawUnexpectedLog) {
            Write-Host "::error::Unity Test Framework rejected an unexpected log for ${Label}. Add a precise LogAssert.Expect for expected logs or fix the production log."
          }
          if ($sawNativeWindowFailure) {
            $nativeWindowMessage = @(
              "::error::Unity editor-window creation failed for ${Label}."
              "CI-driven IMGUI tests should use TestIMGUIExecutor/offscreen UIElements"
              "instead of creating native EditorWindow surfaces."
            ) -join " "
            Write-Host $nativeWindowMessage
          }
        }

        # HANG-CULPRIT DIAGNOSTIC: the historical PlayMode killer is a single test
        # (or its setup/teardown) that hangs -- Unity emits no output, the no-output
        # watchdog tree-kills it, and results.xml is never written. The aggregate
        # "tests did not run" message names nothing. CiTestResultStreamLogger streams
        # one `[uh-test-stream] TEST-STARTED <name>` line as each leaf STARTS and one
        # status line (`Passed|Failed|Skipped|Inconclusive <name> (<dur>s)`) as it
        # FINISHES. A leaf that started but never finished -- the dangling
        # TEST-STARTED with no matching status line -- IS the hang. Surface it by name
        # so the operator (and the next session) sees the exact culprit instead of a
        # generic stall. Best-effort: never throws, no-ops when no stream lines exist.
        function Write-UnityHangCulpritDiagnostic {
          param(
            [Parameter(Mandatory = $true)][string]$ResultsDir,
            [Parameter(Mandatory = $true)][string]$Label
          )

          $startedPattern = '\[uh-test-stream\] TEST-STARTED (.+?)\s*$'
          $finishedPattern = '\[uh-test-stream\] (?:Passed|Failed|Skipped|Inconclusive) (.+?) \([0-9.]+s\)\s*$'
          $runBoundaryPattern = '\[uh-test-stream\] RUN-(?:STARTED|FINISHED)'

          # Tests run sequentially in a PlayMode batch run, so track the in-flight
          # leaf by name: each TEST-STARTED sets it, each finished status clears the
          # matching one. Whatever is still set after the last stream line is the
          # leaf that never reported a result -- the hang. A RUN-STARTED / RUN-FINISHED
          # boundary clears the in-flight name so a test whose finished line was lost to
          # a mid-run domain reload (the streamer re-registers across reloads, producing
          # multiple run segments) cannot be falsely blamed in a later segment.
          $inFlight = $null
          $started = 0
          $finished = 0
          foreach ($logFile in @(Get-UnityDiagnosticLogFiles -ResultsDir $ResultsDir)) {
            try {
              foreach ($rawLine in [System.IO.File]::ReadLines($logFile)) {
                # Strip ANSI color codes so the anchored patterns match regardless of any
                # terminal coloring a future log capture might introduce (keeps the
                # started/finished patterns symmetric).
                $line = $rawLine -replace '\x1b\[[0-9;]*m', ''
                if ([regex]::IsMatch($line, $runBoundaryPattern)) {
                  $inFlight = $null
                  continue
                }
                $startMatch = [regex]::Match($line, $startedPattern)
                if ($startMatch.Success) {
                  $inFlight = $startMatch.Groups[1].Value
                  $started++
                  continue
                }
                $finishMatch = [regex]::Match($line, $finishedPattern)
                if ($finishMatch.Success) {
                  $finished++
                  if ($inFlight -eq $finishMatch.Groups[1].Value) {
                    $inFlight = $null
                  }
                }
              }
            } catch {
              # Best-effort diagnostic only.
            }
          }

          if ($started -lt 1) {
            return
          }

          if ($inFlight) {
            $hangMessage = @(
              "::error::$label HANG CULPRIT: '$inFlight' started but never reported a result"
              "($finished of $started streamed leaves finished). This test (or its"
              "setup/teardown) hung; the no-output watchdog tree-killed Unity before"
              "results.xml was written. Reproduce/fix this test -- everything before it passed."
            ) -join " "
            Write-Host $hangMessage
          } else {
            # Reaching this function means results.xml was missing/zero -- the run DID fail --
            # so this is a warning, not a benign notice: the stall landed between leaves (e.g. a
            # mid-run domain reload or framework overhead) rather than inside a single test body.
            $betweenLeavesMessage = @(
              "::warning::${label}: $finished of $started streamed leaves finished but"
              "no single test was left dangling -- the run aborted BETWEEN leaves"
              "(e.g. a mid-run domain reload or setup/teardown stall). Inspect the"
              "last finished test above and what runs next."
            ) -join " "
            Write-Host $betweenLeavesMessage
          }
        }

        # ALWAYS scan the Unity log for catastrophic patterns first, regardless
        # of which exit branch fires below. The patterns (PrecompiledAssemblyException,
        # CompilationFailedException, error CS####, warning CS8032) are the
        # most common silent-killer causes of every exit branch -- missing dir
        # AND missing XML AND total==0 AND failed>0 can all coincide with a
        # partial Unity crash. The helper gracefully skips when no log file
        # exists, so this is cheap on the happy path. Run it at the TOP so
        # the operator sees the actual root cause first in the GitHub error
        # summary, not buried under a generic "tests did not run" line.
        Write-UnityCatastrophicPatternHits -ResultsDir $dir
        if (-not (Test-Path $dir)) {
          Write-ProvisioningDiagnosticsHint -ResultsDir $dir
          Write-Host "::error::No artifacts directory ($dir) -- Unity Test Runner did not produce results for $label"
          exit 1
        }
        $xml = Get-ChildItem -Path $dir -Recurse -Filter *.xml -ErrorAction SilentlyContinue |
          Where-Object { Select-String -Path $_.FullName -Pattern '<test-run' -Quiet } |
          Select-Object -First 1
        if (-not $xml) {
          # Catastrophic patterns were already scanned at the TOP of this
          # step (see the Write-UnityCatastrophicPatternHits call above the
          # Test-Path block); a second call here would emit duplicate
          # `::error::` annotations for the same hits.
          Write-UnityPackageManagerFailureHints -ResultsDir $dir
          Write-UnityExecutionSymptomDiagnostics -ResultsDir $dir -Label $label
          Write-UnityHangCulpritDiagnostic -ResultsDir $dir -Label $label
          Write-ProvisioningDiagnosticsHint -ResultsDir $dir
          Write-Host "::error::No NUnit results.xml (with a <test-run> element) under $dir -- tests did not run for $label"
          exit 1
        }
        [xml]$doc = Get-Content -LiteralPath $xml.FullName
        $run = $doc.SelectSingleNode('//test-run')
        $total = [int]($run.total)
        $passed = [int]($run.passed)
        $failed = [int]($run.failed)
        $skipped = [int]($run.skipped)
        $failedNodeCount = Get-FailedNodeCount -Doc $doc
        Write-Host "Results: total=$total passed=$passed failed=$failed skipped=$skipped ($($xml.Name))"
        if ($total -lt 1) {
          Write-UnityExecutionSymptomDiagnostics -ResultsDir $dir -Label $label
          Write-UnityHangCulpritDiagnostic -ResultsDir $dir -Label $label
          $zeroCountMessage = @(
            "::error::$label produced zero-count NUnit XML."
            "This can be a failed or aborted Unity run with misleading results.xml,"
            "not proof of an empty assembly list; inspect Unity execution diagnostics above."
          ) -join " "
          Write-Host $zeroCountMessage
          exit 1
        }
        if ($failed -gt 0 -or $failedNodeCount -gt 0) {
          Write-FailedTestAnnotations -Doc $doc -Label $label
          $failureCountForMessage = [Math]::Max($failed, $failedNodeCount)
          Write-Host "::error::$label reported $failureCountForMessage failed test(s); see $($xml.FullName)"
          exit 1
        }
        Write-Host "::notice::${label}: total=$total passed=$passed failed=$failed skipped=$skipped"
