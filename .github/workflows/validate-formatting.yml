name: Validate Formatting

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "**.json"
      - "**.yml"
      - "**.yaml"
      - "**.js"
      - "**.cs"
      - "scripts/validate-formatting.sh"
      - "scripts/tests/test-final-newline.sh"
      - ".github/workflows/validate-formatting.yml"
  pull_request:
    paths:
      - "**.md"
      - "**.json"
      - "**.yml"
      - "**.yaml"
      - "**.js"
      - "**.cs"
      - "scripts/validate-formatting.sh"
      - "scripts/tests/test-final-newline.sh"
      - ".github/workflows/validate-formatting.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js (cached)
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Node.js (no cache)
        if: ${{ hashFiles('package-lock.json') == '' }}
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Test final newline
        run: bash scripts/tests/test-final-newline.sh

      - name: Validate formatting
        run: bash scripts/validate-formatting.sh
