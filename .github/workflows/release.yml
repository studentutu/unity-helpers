name: Release Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, as strict X.Y.Z semver."
        type: string
        required: true
      source_ref:
        description: "Branch, tag, or commit to build release assets from."
        type: string
        required: true
        default: main
      allow_tag_recovery:
        description: "Retarget an existing tag only if npm and GitHub Release are both still unpublished."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify release tag
    if: github.repository == 'wallstop/unity-helpers' || github.repository == 'Ambiguous-Interactive/unity-helpers'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      package-name: ${{ steps.verify.outputs.package-name }}
      package-version: ${{ steps.verify.outputs.package-version }}
      source-ref: ${{ steps.verify.outputs.source-ref }}
      source-sha: ${{ steps.verify.outputs.source-sha }}
      tag: ${{ steps.verify.outputs.tag }}
      tag-action: ${{ steps.verify.outputs.tag-action }}
    steps:
      - name: Validate source ref input
        env:
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="${INPUT_VERSION}"
          source_ref="${INPUT_SOURCE_REF}"
          if [ -z "${tag}" ]; then
            echo "::error::Release version is required."
            exit 1
          fi
          if [[ "${tag}" == *$'\n'* || "${tag}" == *$'\r'* ]]; then
            echo "::error::Release version must be a single line."
            exit 1
          fi
          if [ -z "${source_ref}" ]; then
            echo "::error::Release source ref is required."
            exit 1
          fi
          if [[ "${source_ref}" == *$'\n'* || "${source_ref}" == *$'\r'* ]]; then
            echo "::error::Release source ref must be a single line."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.source_ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Verify tag matches package metadata
        id: verify
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_ALLOW_TAG_RECOVERY: ${{ inputs.allow_tag_recovery }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="${INPUT_VERSION}"
          source_ref="${INPUT_SOURCE_REF}"
          allow_tag_recovery="${INPUT_ALLOW_TAG_RECOVERY}"

          if [ -z "${tag}" ]; then
            echo "::error::Release version is required."
            exit 1
          fi
          if [[ "${tag}" == *$'\n'* || "${tag}" == *$'\r'* ]]; then
            echo "::error::Release version must be a single line."
            exit 1
          fi
          if ! printf '%s\n' "${tag}" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "::error::Release tags must use unprefixed X.Y.Z semver."
            exit 1
          fi
          if [ -z "${source_ref}" ]; then
            echo "::error::Release source ref is required."
            exit 1
          fi
          if [[ "${source_ref}" == *$'\n'* || "${source_ref}" == *$'\r'* ]]; then
            echo "::error::Release source ref must be a single line."
            exit 1
          fi

          source_sha="$(git rev-parse HEAD)"
          package_name="$(jq -r '.name // empty' package.json)"
          package_version="$(jq -r '.version // empty' package.json)"
          if [ -z "${package_name}" ] || [ -z "${package_version}" ]; then
            echo "::error::package.json name/version is missing."
            exit 1
          fi
          if [ "${tag}" != "${package_version}" ]; then
            echo "::error::Tag ${tag} does not match package.json version ${package_version}."
            exit 1
          fi
          # shellcheck disable=SC2016 # PowerShell $env:CHANGELOG_VERSION is expanded by pwsh, not bash.
          if ! CHANGELOG_VERSION="${package_version}" pwsh -NoProfile -Command '
            $ErrorActionPreference = "Stop"
            . ./scripts/release-tools/release-helpers.ps1
            $content = [System.IO.File]::ReadAllText("CHANGELOG.md")
            [void](Get-ChangelogSection -Content $content -Version $env:CHANGELOG_VERSION)
          '; then
            echo "::error::CHANGELOG.md has no exact section with release-note content for ${package_version}."
            exit 1
          fi

          tag_action="none"
          tag_ref_file="${RUNNER_TEMP}/release-tag-ref.json"
          tag_ref_error="${RUNNER_TEMP}/release-tag-ref.err"
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" > "${tag_ref_file}" 2> "${tag_ref_error}"
          tag_lookup_exit=$?
          set -e
          if [ "${tag_lookup_exit}" -eq 0 ]; then
            tag_object_sha="$(jq -r '.object.sha // empty' "${tag_ref_file}")"
            tag_object_type="$(jq -r '.object.type // empty' "${tag_ref_file}")"
            if [ "${tag_object_type}" = "tag" ]; then
              tag_target="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.object.sha')"
            elif [ "${tag_object_type}" = "commit" ]; then
              tag_target="${tag_object_sha}"
            else
              echo "::error::Tag ${tag} points at unsupported object type '${tag_object_type}'."
              exit 1
            fi

            if [ "${tag_target}" != "${source_sha}" ]; then
              if [ "${allow_tag_recovery}" != "true" ]; then
                message="Tag ${tag} already points at ${tag_target}, not selected source ${source_sha}. "
                message+="Re-run with allow_tag_recovery=true only after confirming npm and GitHub Release are unpublished."
                echo "::error::${message}"
                exit 1
              fi
              tag_action="retarget"
            fi
          else
            tag_lookup_output="$(cat "${tag_ref_error}")"
            if ! printf '%s\n' "${tag_lookup_output}" | grep -E '(HTTP 404|Not Found|"status":"404")' >/dev/null; then
              echo "::error::Failed to check whether tag ${tag} exists."
              printf '%s\n' "${tag_lookup_output}"
              exit "${tag_lookup_exit}"
            fi
            echo "::notice::Tag ${tag} does not exist and will be created after package validation and .unitypackage export succeed."
            tag_action="create"
          fi

          if [ "${tag_action}" != "none" ]; then
            npm_published="false"
            npm_view_file="${RUNNER_TEMP}/release-npm-view.txt"
            npm_view_error="${RUNNER_TEMP}/release-npm-view.err"
            set +e
            npm view "${package_name}@${package_version}" version --registry "https://registry.npmjs.org" > "${npm_view_file}" 2> "${npm_view_error}"
            npm_view_exit=$?
            set -e
            if [ "${npm_view_exit}" -eq 0 ]; then
              npm_published="true"
            else
              npm_view_output="$(cat "${npm_view_error}")"
              if ! printf '%s\n' "${npm_view_output}" | grep -E '(E404|404 Not Found|is not in this registry)' >/dev/null; then
                echo "::error::Failed to verify npm publication state for ${package_name}@${package_version}."
                printf '%s\n' "${npm_view_output}"
                exit "${npm_view_exit}"
              fi
            fi

            github_release_exists="false"
            release_view_file="${RUNNER_TEMP}/release-view.json"
            release_view_error="${RUNNER_TEMP}/release-view.err"
            set +e
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" > "${release_view_file}" 2> "${release_view_error}"
            release_lookup_exit=$?
            set -e
            if [ "${release_lookup_exit}" -eq 0 ]; then
              github_release_exists="true"
            else
              release_lookup_output="$(cat "${release_view_error}")"
              if ! printf '%s\n' "${release_lookup_output}" | grep -E '(HTTP 404|Not Found|"status":"404")' >/dev/null; then
                echo "::error::Failed to verify GitHub Release state for ${tag}."
                printf '%s\n' "${release_lookup_output}"
                exit "${release_lookup_exit}"
              fi
            fi

            if [ "${npm_published}" = "true" ] || [ "${github_release_exists}" = "true" ]; then
              echo "::error::Published artifacts already exist; refusing to create or retarget tag ${tag}. npm=${npm_published}, github_release=${github_release_exists}."
              exit 1
            fi
          fi

          {
            printf 'source-ref=%s\n' "${source_ref}"
            echo "source-sha=${source_sha}"
            echo "tag-action=${tag_action}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "package-name=${package_name}"
            echo "package-version=${package_version}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

  release-ready:
    name: Confirm release publish inputs
    needs: verify-tag
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      package-name: ${{ needs.verify-tag.outputs.package-name }}
      package-version: ${{ needs.verify-tag.outputs.package-version }}
      source-ref: ${{ needs.verify-tag.outputs.source-ref }}
      source-sha: ${{ needs.verify-tag.outputs.source-sha }}
      tag: ${{ needs.verify-tag.outputs.tag }}
      tag-action: ${{ needs.verify-tag.outputs.tag-action }}
    steps:
      - name: Confirm release inputs
        env:
          PACKAGE_NAME: ${{ needs.verify-tag.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.verify-tag.outputs.package-version }}
          SOURCE_REF: ${{ needs.verify-tag.outputs.source-ref }}
          SOURCE_SHA: ${{ needs.verify-tag.outputs.source-sha }}
          TAG: ${{ needs.verify-tag.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Release ${TAG} will publish ${PACKAGE_NAME}@${PACKAGE_VERSION} from ${SOURCE_REF} (${SOURCE_SHA})."

  validate-package:
    name: Validate and pack npm package
    needs: release-ready
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release-ready.outputs.source-sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Install Node dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund --package-lock=false
          fi

      - name: Run release package validation
        run: |
          set -euo pipefail
          npm run test:release-tools
          npm run lint:changelog
          npm run test:npm-package-changelog
          npm run test:npm-package-signature
          npm run validate:npm-package

      - name: Pack npm package
        id: pack
        run: |
          set -euo pipefail
          pack_dir="${RUNNER_TEMP}/npm-pack"
          mkdir -p "${pack_dir}"
          pack_json="$(npm pack --json --pack-destination "${pack_dir}")"
          package_file="$(printf '%s' "${pack_json}" | jq -r '.[0].filename')"
          if [ -z "${package_file}" ] || [ ! -f "${pack_dir}/${package_file}" ]; then
            echo "::error::npm pack did not produce a tarball."
            exit 1
          fi
          mkdir -p .artifacts/release
          mv "${pack_dir}/${package_file}" ".artifacts/release/${package_file}"
          (cd .artifacts/release && sha256sum "${package_file}" > "${package_file}.sha256")
          pwsh -NoProfile -File scripts/release-tools/write-release-notes.ps1 \
            -Version "${{ needs.release-ready.outputs.package-version }}" \
            -Footer \
            -OutputPath .artifacts/release/release-notes.md
          echo "package-file=${package_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload release package artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-package
          path: .artifacts/release/
          if-no-files-found: error
          overwrite: true

  unitypackage:
    name: Export .unitypackage
    needs:
      - release-ready
      - validate-package
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release-ready.outputs.source-sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Acquire organization Unity lock
        id: unity_lock
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: release-${{ needs.release-ready.outputs.package-version }}
          runner-id: ${{ runner.name }}
          timeout-minutes: "210"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Export Unity package
        id: export_unitypackage
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_VERSION: ${{ vars.RELEASE_UNITY_VERSION }}
        run: |
          set -euo pipefail
          if [ -z "${UNITY_VERSION:-}" ]; then
            UNITY_VERSION="$(jq -r '.release' .github/unity-versions.json)"
            export UNITY_VERSION
          fi
          output=".artifacts/unitypackage/${{ needs.release-ready.outputs.package-name }}-${{ needs.release-ready.outputs.package-version }}.unitypackage"
          bash scripts/unity/export-unitypackage.sh --output "${output}"

      - name: Return Unity license
        id: return_unity_license
        if: ${{ always() && steps.unity_lock.outcome == 'success' }}
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: .artifacts/unity/unitypackage-project/unitypackage-output/unity.log
          prior-command-succeeded: ${{ steps.export_unitypackage.outcome == 'success' }}
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: ${{ always() && (steps.unity_lock.outcome == 'success' || steps.unity_lock.outcome == 'failure' || steps.unity_lock.outcome == 'cancelled') }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: release-${{ needs.release-ready.outputs.package-version }}
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Dump Unity export log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/unitypackage-project/unitypackage-output
          label: Unity package export

      - name: Upload .unitypackage export diagnostics
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: unitypackage-export-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .artifacts/unity/unitypackage-project/Assets/Editor/UnityHelpersPackageExporter.cs
            .artifacts/unity/unitypackage-project/Packages/manifest.json
            .artifacts/unity/unitypackage-project/ProjectSettings/
            .artifacts/unity/unitypackage-project/unitypackage-output/*.log
          if-no-files-found: warn
          retention-days: 14
          overwrite: true

      - name: Upload .unitypackage artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-unitypackage
          path: .artifacts/unitypackage/
          if-no-files-found: error
          overwrite: true

  prepare-tag:
    name: Prepare release tag
    needs:
      - release-ready
      - validate-package
      - unitypackage
    if: ${{ needs.release-ready.outputs.tag-action != 'none' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Recheck release artifacts before tag mutation
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ needs.release-ready.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.release-ready.outputs.package-version }}
          TAG: ${{ needs.release-ready.outputs.tag }}
        run: |
          set -euo pipefail
          npm_published="false"
          npm_view_file="${RUNNER_TEMP}/release-npm-view.txt"
          npm_view_error="${RUNNER_TEMP}/release-npm-view.err"
          set +e
          npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry "https://registry.npmjs.org" > "${npm_view_file}" 2> "${npm_view_error}"
          npm_view_exit=$?
          set -e
          if [ "${npm_view_exit}" -eq 0 ]; then
            npm_published="true"
          else
            npm_view_output="$(cat "${npm_view_error}")"
            if ! printf '%s\n' "${npm_view_output}" | grep -E '(E404|404 Not Found|is not in this registry)' >/dev/null; then
              echo "::error::Failed to verify npm publication state for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
              printf '%s\n' "${npm_view_output}"
              exit "${npm_view_exit}"
            fi
          fi

          github_release_exists="false"
          release_view_file="${RUNNER_TEMP}/release-view.json"
          release_view_error="${RUNNER_TEMP}/release-view.err"
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" > "${release_view_file}" 2> "${release_view_error}"
          release_lookup_exit=$?
          set -e
          if [ "${release_lookup_exit}" -eq 0 ]; then
            github_release_exists="true"
          else
            release_lookup_output="$(cat "${release_view_error}")"
            if ! printf '%s\n' "${release_lookup_output}" | grep -E '(HTTP 404|Not Found|"status":"404")' >/dev/null; then
              echo "::error::Failed to verify GitHub Release state for ${TAG}."
              printf '%s\n' "${release_lookup_output}"
              exit "${release_lookup_exit}"
            fi
          fi

          if [ "${npm_published}" = "true" ] || [ "${github_release_exists}" = "true" ]; then
            echo "::error::Published artifacts already exist; refusing to create or retarget tag ${TAG}. npm=${npm_published}, github_release=${github_release_exists}."
            exit 1
          fi

      - name: Create or retarget release tag
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_SHA: ${{ needs.release-ready.outputs.source-sha }}
          TAG: ${{ needs.release-ready.outputs.tag }}
          TAG_ACTION: ${{ needs.release-ready.outputs.tag-action }}
        run: |
          set -euo pipefail

          gh_api_or_error() {
            local description="$1"
            shift
            local stdout_file="${RUNNER_TEMP}/tag-gh-api-stdout.txt"
            local stderr_file="${RUNNER_TEMP}/tag-gh-api-stderr.txt"
            set +e
            gh api "$@" > "${stdout_file}" 2> "${stderr_file}"
            local exit_code=$?
            set -e
            if [ "${exit_code}" -ne 0 ]; then
              {
                echo "::error::${description} failed. The release tag may have changed after verification, or the GitHub token may lack contents:write."
                if [ -s "${stderr_file}" ]; then
                  cat "${stderr_file}"
                fi
                if [ -s "${stdout_file}" ]; then
                  cat "${stdout_file}"
                fi
              } >&2
              exit "${exit_code}"
            fi
            cat "${stdout_file}"
          }

          created_tag_sha="$(
            gh_api_or_error "Creating annotated tag object ${TAG}" --method POST "repos/${GITHUB_REPOSITORY}/git/tags" \
              --field tag="${TAG}" \
              --field message="Release ${TAG}" \
              --field object="${SOURCE_SHA}" \
              --field type="commit" \
              --jq '.sha'
          )"
          if [ "${TAG_ACTION}" = "create" ]; then
            gh_api_or_error "Creating tag ref refs/tags/${TAG}" --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              --field ref="refs/tags/${TAG}" \
              --field sha="${created_tag_sha}" >/dev/null
            echo "::notice::Created release tag ${TAG} at ${SOURCE_SHA}."
          elif [ "${TAG_ACTION}" = "retarget" ]; then
            gh_api_or_error "Retargeting tag ref refs/tags/${TAG}" --method PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" \
              --field sha="${created_tag_sha}" \
              --field force=true >/dev/null
            echo "::notice::Retargeted release tag ${TAG} to ${SOURCE_SHA}."
          else
            echo "::error::Unsupported tag action '${TAG_ACTION}'."
            exit 1
          fi

  publish:
    name: Publish npm and GitHub Release
    needs:
      - release-ready
      - validate-package
      - unitypackage
      - prepare-tag
    if: >-
      ${{
        always() &&
        needs.release-ready.result == 'success' &&
        needs.validate-package.result == 'success' &&
        needs.unitypackage.result == 'success' &&
        (needs.release-ready.outputs.tag-action == 'none' || needs.prepare-tag.result == 'success')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          registry-url: "https://registry.npmjs.org"

      - name: Download release package
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: .artifacts/release

      - name: Download .unitypackage
        uses: actions/download-artifact@v8
        with:
          name: release-unitypackage
          path: .artifacts/unitypackage

      - name: Verify downloaded artifacts
        id: artifacts
        env:
          EXPECTED_PACKAGE_NAME: ${{ needs.release-ready.outputs.package-name }}
          EXPECTED_PACKAGE_VERSION: ${{ needs.release-ready.outputs.package-version }}
        run: |
          set -euo pipefail
          mapfile -t packages < <(find .artifacts/release -maxdepth 1 -type f -name '*.tgz' | sort)
          mapfile -t unitypackages < <(find .artifacts/unitypackage -maxdepth 1 -type f -name '*.unitypackage' | sort)
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one npm tarball; found ${#packages[@]}."
            exit 1
          fi
          if [ "${#unitypackages[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one .unitypackage; found ${#unitypackages[@]}."
            exit 1
          fi
          package_file="${packages[0]}"
          unitypackage_file="${unitypackages[0]}"
          (cd "$(dirname "${package_file}")" && sha256sum -c "$(basename "${package_file}").sha256")
          (cd "$(dirname "${unitypackage_file}")" && sha256sum -c "$(basename "${unitypackage_file}").sha256")

          notes_file=".artifacts/release/release-notes.md"
          if [ ! -s "${notes_file}" ]; then
            echo "::error::Release notes artifact is missing or empty: ${notes_file}."
            exit 1
          fi

          package_manifest="$(tar -xOf "${package_file}" package/package.json)"
          packed_name="$(printf '%s' "${package_manifest}" | jq -r '.name // empty')"
          packed_version="$(printf '%s' "${package_manifest}" | jq -r '.version // empty')"
          if [ "${packed_name}" != "${EXPECTED_PACKAGE_NAME}" ] || [ "${packed_version}" != "${EXPECTED_PACKAGE_VERSION}" ]; then
            echo "::error::Npm tarball identity mismatch. Expected ${EXPECTED_PACKAGE_NAME}@${EXPECTED_PACKAGE_VERSION}; found ${packed_name}@${packed_version}."
            exit 1
          fi

          echo "package-file=${package_file}" >> "${GITHUB_OUTPUT}"
          echo "unitypackage-file=${unitypackage_file}" >> "${GITHUB_OUTPUT}"

      - name: Verify release tag target before publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ needs.release-ready.outputs.source-sha }}
          TAG: ${{ needs.release-ready.outputs.tag }}
        run: |
          set -euo pipefail
          tag_ref_file="${RUNNER_TEMP}/publish-tag-ref.json"
          tag_ref_error="${RUNNER_TEMP}/publish-tag-ref.err"
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > "${tag_ref_file}" 2> "${tag_ref_error}"
          tag_lookup_exit=$?
          set -e
          if [ "${tag_lookup_exit}" -ne 0 ]; then
            tag_lookup_output="$(cat "${tag_ref_error}")"
            echo "::error::Failed to verify release tag ${TAG} before publish."
            printf '%s\n' "${tag_lookup_output}"
            exit "${tag_lookup_exit}"
          fi

          tag_object_sha="$(jq -r '.object.sha // empty' "${tag_ref_file}")"
          tag_object_type="$(jq -r '.object.type // empty' "${tag_ref_file}")"
          if [ "${tag_object_type}" = "tag" ]; then
            tag_target="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" --jq '.object.sha')"
          elif [ "${tag_object_type}" = "commit" ]; then
            tag_target="${tag_object_sha}"
          else
            echo "::error::Tag ${TAG} points at unsupported object type '${tag_object_type}'."
            exit 1
          fi

          if [ "${tag_target}" != "${SOURCE_SHA}" ]; then
            echo "::error::Tag ${TAG} points at ${tag_target}, not selected source ${SOURCE_SHA}."
            exit 1
          fi

      - name: Publish npm package
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ needs.release-ready.outputs.package-name }}
          PACKAGE_VERSION: ${{ needs.release-ready.outputs.package-version }}
          PACKAGE_FILE: ${{ steps.artifacts.outputs.package-file }}
        run: |
          set -euo pipefail
          npm_view_file="${RUNNER_TEMP}/publish-npm-view.txt"
          npm_view_error="${RUNNER_TEMP}/publish-npm-view.err"
          set +e
          npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry "https://registry.npmjs.org" > "${npm_view_file}" 2> "${npm_view_error}"
          npm_view_exit=$?
          set -e
          if [ "${npm_view_exit}" -eq 0 ]; then
            echo "::notice::${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm; skipping publish."
            exit 0
          fi

          npm_view_output="$(cat "${npm_view_error}")"
          if ! printf '%s\n' "${npm_view_output}" | grep -E '(E404|404 Not Found|is not in this registry)' >/dev/null; then
            echo "::error::Failed to verify npm publication state for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            printf '%s\n' "${npm_view_output}"
            exit "${npm_view_exit}"
          fi

          if [ -n "${NPM_TOKEN:-}" ]; then
            NODE_AUTH_TOKEN="${NPM_TOKEN}" npx --yes --package=npm@^11.5.1 npm publish "${PACKAGE_FILE}" --access public
          else
            npx --yes --package=npm@^11.5.1 npm publish "${PACKAGE_FILE}" --access public --provenance
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-ready.outputs.tag }}
          PACKAGE_FILE: ${{ steps.artifacts.outputs.package-file }}
          UNITYPACKAGE_FILE: ${{ steps.artifacts.outputs.unitypackage-file }}
        run: |
          set -euo pipefail
          notes_file=".artifacts/release/release-notes.md"
          assets=(
            "${PACKAGE_FILE}"
            "${PACKAGE_FILE}.sha256"
            "${UNITYPACKAGE_FILE}"
            "${UNITYPACKAGE_FILE}.sha256"
          )

          release_view_file="${RUNNER_TEMP}/publish-release-view.json"
          release_view_error="${RUNNER_TEMP}/publish-release-view.err"
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" > "${release_view_file}" 2> "${release_view_error}"
          release_lookup_exit=$?
          set -e
          if [ "${release_lookup_exit}" -eq 0 ]; then
            gh release upload "${TAG}" "${assets[@]}" --clobber
            gh release edit "${TAG}" --title "${TAG}" --notes-file "${notes_file}" --draft=false --prerelease=false
            exit 0
          fi

          release_lookup_output="$(cat "${release_view_error}")"
          if ! printf '%s\n' "${release_lookup_output}" | grep -E '(HTTP 404|Not Found|"status":"404")' >/dev/null; then
            echo "::error::Failed to verify GitHub Release state for ${TAG}."
            printf '%s\n' "${release_lookup_output}"
            exit "${release_lookup_exit}"
          fi

          gh release create "${TAG}" "${assets[@]}" --title "${TAG}" --notes-file "${notes_file}" --verify-tag

      - name: Verify GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-ready.outputs.tag }}
          PACKAGE_FILE: ${{ steps.artifacts.outputs.package-file }}
          UNITYPACKAGE_FILE: ${{ steps.artifacts.outputs.unitypackage-file }}
        run: |
          set -euo pipefail
          asset_json="$(gh release view "${TAG}" --json assets)"
          for asset in \
            "$(basename "${PACKAGE_FILE}")" \
            "$(basename "${PACKAGE_FILE}").sha256" \
            "$(basename "${UNITYPACKAGE_FILE}")" \
            "$(basename "${UNITYPACKAGE_FILE}").sha256"; do
            if ! printf '%s' "${asset_json}" | jq -e --arg name "${asset}" '.assets[] | select(.name == $name)' >/dev/null; then
              echo "::error::Release ${TAG} is missing asset ${asset}."
              exit 1
            fi
          done
