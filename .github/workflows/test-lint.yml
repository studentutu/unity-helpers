name: Test Lint

on:
  push:
    branches:
      - main
    paths:
      - "Tests/**/*.cs"
      - "scripts/comment-stripping.ps1"
      - "scripts/lint-tests.ps1"
      - "scripts/tests/test-comment-stripping.ps1"
      - "scripts/tests/test-lint-tests.ps1"
      - "scripts/unity/report-slow-tests.ps1"
      - "scripts/tests/test-report-slow-tests.ps1"
      - "scripts/unity/run-ci-tests.ps1"
      - "scripts/tests/test-process-watchdog.ps1"
      - "scripts/tests/test-unity-license-activation-retry.ps1"
      - "scripts/tests/test-catastrophic-pattern-sync.ps1"
      - ".github/actions/verify-unity-results/action.yml"
      - ".github/actions/dump-unity-log-tail/action.yml"
      - ".github/workflows/test-lint.yml"
  pull_request:
    paths:
      - "Tests/**/*.cs"
      - "scripts/comment-stripping.ps1"
      - "scripts/lint-tests.ps1"
      - "scripts/tests/test-comment-stripping.ps1"
      - "scripts/tests/test-lint-tests.ps1"
      - "scripts/unity/report-slow-tests.ps1"
      - "scripts/tests/test-report-slow-tests.ps1"
      - "scripts/unity/run-ci-tests.ps1"
      - "scripts/tests/test-process-watchdog.ps1"
      - "scripts/tests/test-unity-license-activation-retry.ps1"
      - "scripts/tests/test-catastrophic-pattern-sync.ps1"
      - ".github/actions/verify-unity-results/action.yml"
      - ".github/actions/dump-unity-log-tail/action.yml"
      - ".github/workflows/test-lint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Test comment-stripping helper
        shell: pwsh
        run: ./scripts/tests/test-comment-stripping.ps1 -VerboseOutput

      - name: Test test linter
        shell: pwsh
        run: ./scripts/tests/test-lint-tests.ps1 -VerboseOutput

      - name: Test slow-test reporter
        shell: pwsh
        run: ./scripts/tests/test-report-slow-tests.ps1 -VerboseOutput

      - name: Test process watchdog
        shell: pwsh
        run: ./scripts/tests/test-process-watchdog.ps1 -VerboseOutput

      - name: Test Unity license activation retry
        shell: pwsh
        run: ./scripts/tests/test-unity-license-activation-retry.ps1 -VerboseOutput

      - name: Test catastrophic-pattern sync
        shell: pwsh
        run: ./scripts/tests/test-catastrophic-pattern-sync.ps1 -VerboseOutput

      - name: Lint tests
        shell: pwsh
        run: ./scripts/lint-tests.ps1 -VerboseOutput
