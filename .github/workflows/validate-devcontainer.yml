name: Validate Dev Container

on:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/**"
      - "scripts/validate-devcontainer-config.ps1"
      - "scripts/validate-devcontainer-urls.sh"
      - "scripts/verify-devcontainer-tools.sh"
      - "scripts/tests/test-validate-devcontainer-urls.sh"
      - "scripts/tests/test-post-create.sh"
      - ".github/workflows/build-publish-devcontainer.yml"
      - ".github/workflows/validate-devcontainer.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "scripts/validate-devcontainer-config.ps1"
      - "scripts/validate-devcontainer-urls.sh"
      - "scripts/verify-devcontainer-tools.sh"
      - "scripts/tests/test-validate-devcontainer-urls.sh"
      - "scripts/tests/test-post-create.sh"
      - ".github/workflows/build-publish-devcontainer.yml"
      - ".github/workflows/validate-devcontainer.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-devcontainer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate devcontainer config
        shell: pwsh
        run: ./scripts/validate-devcontainer-config.ps1 -VerboseOutput

      - name: Validate Dockerfile download URLs
        run: bash scripts/validate-devcontainer-urls.sh

      - name: Test devcontainer URL validation contracts
        run: bash scripts/tests/test-validate-devcontainer-urls.sh

      - name: Validate post-create script
        run: bash scripts/tests/test-post-create.sh --verbose
