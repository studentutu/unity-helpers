name: LLM Instructions Lint

on:
  push:
    branches:
      - main
    paths:
      - ".llm/**"
      - "scripts/lint-llm-instructions.ps1"
      - "scripts/generate-skills-index.ps1"
      - "scripts/tests/test-lint-skill-sizes.ps1"
      - "scripts/tests/test-llm-instructions-lint.ps1"
      - "scripts/lint-skill-sizes.ps1"
      - ".github/workflows/llm-instructions-lint.yml"
  pull_request:
    paths:
      - ".llm/**"
      - "scripts/lint-llm-instructions.ps1"
      - "scripts/generate-skills-index.ps1"
      - "scripts/tests/test-lint-skill-sizes.ps1"
      - "scripts/tests/test-llm-instructions-lint.ps1"
      - "scripts/lint-skill-sizes.ps1"
      - ".github/workflows/llm-instructions-lint.yml"

permissions:
  contents: read

jobs:
  lint-llm-instructions:
    # Run on BOTH Ubuntu and Windows so the skills-index generator's cross-OS
    # determinism (ordinal sort, UTF-8 no BOM, LF) is actually enforced in CI, not
    # just assumed. A Windows-only drift (e.g. a BOM from Set-Content -Encoding
    # UTF8 on PowerShell 5.1) would fail the Windows leg.
    name: lint-llm-instructions (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js (cached)
        if: ${{ hashFiles('package-lock.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Node.js (no cache)
        if: ${{ hashFiles('package-lock.json') == '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        # Explicit bash so the POSIX `if [ -f ... ]` works on the Windows runner
        # (whose default `run:` shell is pwsh). Git for Windows provides bash.
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Lint LLM instructions
        shell: pwsh
        run: ./scripts/lint-llm-instructions.ps1 -VerboseOutput

      - name: Test LLM instructions lint
        shell: pwsh
        run: ./scripts/tests/test-llm-instructions-lint.ps1 -VerboseOutput

      - name: Test skill size linter
        shell: pwsh
        run: ./scripts/tests/test-lint-skill-sizes.ps1 -VerboseOutput

      - name: Check skill file sizes
        shell: pwsh
        run: ./scripts/lint-skill-sizes.ps1 -VerboseOutput

      - name: Validate skills index is up-to-date
        # Regenerate the file and fail if it differs from the committed bytes. This
        # is the cross-OS guard: if Windows and Ubuntu generate different content,
        # one leg's git diff is non-empty. The lint step above also asserts this,
        # plus encoding (no BOM / LF) and generator determinism.
        shell: pwsh
        run: |
          # generate-skills-index.ps1 is pure PowerShell (it runs no native process),
          # so on success it leaves $LASTEXITCODE unset ($null) in this fresh pwsh step.
          # The old `if ($LASTEXITCODE -ne 0)` fired a phantom failure ($null -ne 0 is
          # $true in PowerShell), logged as "failed (exit )." with an empty code. Gate on
          # truthiness instead: `if ($LASTEXITCODE)` is false for BOTH $null and 0, and
          # true only for a real non-zero code (the generator's `exit 1` on a missing
          # skills dir), which we then surface. A thrown / ErrorActionPreference='Stop'
          # error already aborts the step before this line; the git-status check below is
          # the substantive assertion (drift / never-committed index.md).
          ./scripts/generate-skills-index.ps1
          if ($LASTEXITCODE) { exit $LASTEXITCODE }
          # --porcelain catches BOTH a drifted (modified) and a never-committed
          # (untracked) index.md, unlike `git diff` which ignores untracked files.
          $status = git status --porcelain -- .llm/skills/index.md
          if ($status) {
            Write-Host "::error::.llm/skills/index.md is out of date or uncommitted. Run: pwsh -NoProfile -File scripts/generate-skills-index.ps1 and commit it."
            git diff -- .llm/skills/index.md
            exit 1
          }
          Write-Host "Skills index is up-to-date."
