name: Unity Tests

# cspell:ignore lfs WSL

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:
    inputs:
      unity-version:
        description: "Pin a single Unity version. Empty = full matrix."
        required: false
        default: ""
        type: string
      test-mode:
        description: "Pin a single test mode."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - editmode
          - playmode
          - standalone
      abort-on-first-failure:
        description: >-
          Stop the matrix at the first failing leg (fast iteration). Default
          false keeps the full matrix running for cross-version compatibility
          visibility. Only honored on workflow_dispatch.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  checks: write

concurrency:
  group: unity-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix-config:
    name: Resolve Unity test matrix
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected)
      }}
    environment: unity-license
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      unity-versions: ${{ steps.resolve.outputs.unity-versions }}
      test-modes: ${{ steps.resolve.outputs.test-modes }}
      # Fast tier (editmode + playmode) and the gated standalone tier. See the
      # resolve step for how the matrix is split.
      matrix-include: ${{ steps.resolve.outputs.matrix-include }}
      matrix-include-standalone: ${{ steps.resolve.outputs.matrix-include-standalone }}
      has-required-secrets: ${{ steps.check-secrets.outputs.has-secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Fail FAST on a bad test-project module manifest before any (expensive,
      # self-hosted) Unity leg starts. A non-existent UPM id here -- e.g. the
      # bogus 'com.unity.modules.grid' (declare com.unity.modules.tilemap for
      # Grid) -- makes every matrix leg fail ~30 min later with no NUnit
      # results.xml and no clearly-named cause. This
      # hosted-runner check turns that whole class into an instant, self-
      # describing red on the PR. run-ci-tests.ps1's catastrophic-pattern scan is
      # the in-Unity backstop for the same failure.
      - name: Validate Unity test-project module manifest
        shell: pwsh
        run: ./scripts/lint-unity-test-modules.ps1 -VerboseOutput

      # NOTE: DxMessaging had a "ci-owned docs-only PR" detection here that
      # skipped the licensed matrix when a PR touched ONLY its perf-numbers doc
      # + baseline. unity-helpers has no such CI-owned perf-doc auto-commit on
      # the PR path (the unity-benchmarks workflow commits perf results from a
      # SCHEDULED run, not a PR), so that detection is intentionally DROPPED for
      # simplicity. If a perf-doc auto-update PR flow is added later, repoint a
      # docs-only gate at docs/performance/ rather than DxMessaging's
      # docs/architecture/performance.md path.
      - name: Resolve dispatch overrides
        id: resolve
        env:
          INPUT_UNITY_VERSION: ${{ inputs.unity-version }}
          INPUT_TEST_MODE: ${{ inputs.test-mode }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_UNITY_VERSION:-}" ]; then
            versions="[\"${INPUT_UNITY_VERSION}\"]"
          else
            versions="$(jq -c '.all' .github/unity-versions.json)"
          fi
          if [ -n "${INPUT_TEST_MODE:-}" ] && [ "${INPUT_TEST_MODE}" != "all" ]; then
            modes="[\"${INPUT_TEST_MODE}\"]"
          else
            modes='["editmode","playmode","standalone"]'
          fi
          # Split the matrix into a FAST tier (editmode + playmode) and a gated
          # STANDALONE tier. The unity-tests-standalone job `needs:` unity-tests,
          # so a fast-tier failure SKIPS the ~30-min-each IL2CPP standalone legs --
          # a fundamental break costs minutes, not ~90 min of player builds. Because
          # the org build-lock serializes every leg onto one seat, standalone always
          # ran last anyway, so gating it adds zero wall-clock to a green run.
          #
          # Each tier's include is mode-major, version-minor, ordered explicitly
          # (GitHub's bare cartesian expansion order is not contractually
          # guaranteed). Only split when the run actually contains BOTH a fast mode
          # AND standalone; a single-mode dispatch pin (e.g. standalone-only) runs
          # entirely in the fast tier with an empty standalone tier, so it is not
          # skipped by the gate.
          filter_modes() {
            jq -cn --argjson modes "${modes}" --argjson p "$1" \
              '[ $p[] | select(. as $x | $modes | index($x)) ]'
          }
          build_include() {
            jq -cn --argjson versions "${versions}" --argjson m "$1" \
              '[ $m[] | . as $mode | $versions[] | { "unity-version": ., "test-mode": $mode } ]'
          }
          split="$(jq -cn --argjson modes "${modes}" \
            '(($modes | index("standalone")) != null)
              and (($modes | map(select(. == "editmode" or . == "playmode")) | length) > 0)')"
          if [ "${split}" = "true" ]; then
            fast_modes="$(filter_modes '["editmode","playmode"]')"
            std_modes='["standalone"]'
          else
            fast_modes="$(filter_modes '["editmode","playmode","standalone"]')"
            std_modes='[]'
          fi
          include_fast="$(build_include "${fast_modes}")"
          include_std="$(build_include "${std_modes}")"
          {
            echo "unity-versions=${versions}"
            echo "test-modes=${modes}"
            echo "matrix-include=${include_fast}"
            echo "matrix-include-standalone=${include_std}"
          } >> "${GITHUB_OUTPUT}"

      - name: Check for required licensed workflow secrets
        id: check-secrets
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${UNITY_SERIAL:-}" ] && \
             [ -n "${UNITY_EMAIL:-}" ] && \
             [ -n "${UNITY_PASSWORD:-}" ] && \
             [ -n "${BUILD_LOCK_APP_ID:-}" ] && \
             [ -n "${BUILD_LOCK_APP_PRIVATE_KEY:-}" ]; then
            echo "has-secrets=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has-secrets=false" >> "${GITHUB_OUTPUT}"
          fi

  runner-preflight:
    name: Self-hosted runner access preflight
    # Runs on ubuntu-latest BEFORE any self-hosted matrix entry tries to
    # queue. This converts the "stuck forever" failure mode that motivated
    # docs/runbooks/unity-runners-after-transfer.md into a fast,
    # clearly-explained failure. The runbook explains the post-transfer
    # runner-group ACL pitfall and the resolution paths.
    #
    # CRITICAL CONTRACT: this preflight must NEVER make Unity CI more
    # broken than the no-preflight baseline. If the token cannot list
    # either the org-level OR repo-level runner inventory (403/404 from
    # both), the preflight emits a ::warning:: and exits 0 (soft pass).
    # Only when we can prove the inventory is wrong do we fail hard.
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected)
      }}
    environment: unity-license
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: read
      # NOTE: `administration: read` is NOT a valid permissions key for
      # workflow GITHUB_TOKEN (per actionlint and the GitHub docs schema).
      # Listing self-hosted runners requires admin:org (org-scope) OR a
      # fine-grained PAT with repo "Administration: read" -- neither of
      # which the default GITHUB_TOKEN can carry. The soft-pass path in
      # the run script below is the supported coverage when the token
      # is unscoped. See docs/runbooks/unity-runners-after-transfer.md.
    concurrency:
      group: ${{ github.workflow }}-runner-preflight-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Probe self-hosted runner availability
        env:
          GH_TOKEN: ${{ secrets.RUNNER_AUDIT_PAT || secrets.GITHUB_TOKEN }}
          REQUIRED_LABELS: "self-hosted,Windows,RAM-64GB"
        # Repeated literal of the labels list. Keep in sync with unity-tests
        # `runs-on:` declaration below; this preflight must run before any
        # self-hosted matrix in this workflow.
        # gh api --paginate | jq -s pattern mirrors stuck-job-watchdog.yml;
        # see that file's comments for why `jq -s` is required.
        run: |
          set -euo pipefail
          echo "::group::Runner-access preflight"
          echo "Required labels: ${REQUIRED_LABELS}"
          IFS=',' read -r -a required <<< "${REQUIRED_LABELS}"
          runners_json="$(mktemp)"
          runners_scope=""
          # 1) Try the ORG-scoped endpoint first. Self-hosted runners live
          # at org scope in this repo (group "Default" in Ambiguous-Interactive).
          # The default GITHUB_TOKEN often lacks admin:org and will 403 here.
          if gh api --paginate \
              "orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners?per_page=100" \
              2>/dev/null \
              | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
            runners_scope="org"
          else
            # 2) Fall back to the REPO-scoped endpoint. Requires
            # administration:read; less common to be granted but possible.
            if gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
                2>/dev/null \
                | jq -s '[.[] | (.runners // [])[]]' > "${runners_json}" 2>/dev/null; then
              runners_scope="repo"
            fi
          fi
          if [ -z "${runners_scope}" ]; then
            # 3) Soft pass: both endpoints failed (almost certainly the
            # default GITHUB_TOKEN lacks scope). DO NOT fail the build --
            # that would make Unity CI strictly more broken than baseline.
            # The watchdog + manual unstick workflows still cover the
            # actually-stuck case.
            org_url="orgs/${GITHUB_REPOSITORY_OWNER}/actions/runners"
            repo_url="repos/${GITHUB_REPOSITORY}/actions/runners"
            {
              echo "::warning::Runner inventory unavailable from both ${org_url}"
              echo "::warning::and ${repo_url} (likely 403: GITHUB_TOKEN lacks admin:org"
              echo "::warning::or administration:read)."
              echo "::warning::See docs/runbooks/unity-runners-after-transfer.md"
              echo "::warning::for how to plumb a RUNNER_AUDIT_PAT secret to upgrade"
              echo "::warning::this soft-pass to a hard-pass."
            }
            echo "Soft pass: skipping runner inventory check."
            echo "::endgroup::"
            exit 0
          fi
          echo "Runner inventory scope: ${runners_scope}"
          total="$(jq 'length' < "${runners_json}")"
          echo "Visible runners (${runners_scope} scope): ${total}"
          # Find at least one ONLINE runner with all required labels.
          matched="$(jq --argjson labels "$(printf '%s\n' "${required[@]}" | jq -R . | jq -s .)" '
            [ .[]
              | select(.status == "online")
              | select((($labels - ((.labels // []) | map(.name))) | length) == 0)
            ] | length
          ' < "${runners_json}")"
          echo "Runners satisfying ${REQUIRED_LABELS}: ${matched}"
          if [ "${matched}" -lt 1 ]; then
            {
              echo "::error::No online self-hosted runner satisfies the required labels (${REQUIRED_LABELS})."
              echo "The Unity matrix would queue forever."
              echo "See docs/runbooks/unity-runners-after-transfer.md for the post-transfer runner-group ACL fix."
            }
            jq '[ .[] | {name, status, busy, labels: [(.labels // [])[].name]} ]' \
              < "${runners_json}"
            exit 1
          fi
          echo "::endgroup::"

  # FAST tier: editmode + playmode across all versions. The expensive standalone
  # IL2CPP legs live in unity-tests-standalone, which `needs:` this job -- so a
  # fundamental break here (compile error in any editmode leg, mass runtime failure
  # in any leg) SKIPS the ~90 min of standalone builds entirely.
  unity-tests:
    name: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}
    needs:
      - matrix-config
      - runner-preflight
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected) &&
        needs.matrix-config.outputs.has-required-secrets == 'true'
      }}
    environment: unity-license
    runs-on: [self-hosted, Windows, RAM-64GB]
    timeout-minutes: 1200
    strategy:
      # Default false keeps the full matrix running so cross-version
      # compatibility stays visible on a red run. workflow_dispatch can flip
      # abort-on-first-failure to stop at the first failing leg for fast
      # iteration (with max-parallel:2 that means "stop launching further legs").
      fail-fast: ${{ github.event_name == 'workflow_dispatch' && inputs.abort-on-first-failure == 'true' }}
      max-parallel: 2
      matrix:
        # Ordered fast-tier include from matrix-config: editmode then playmode,
        # version-minor. matrix.unity-version / matrix.test-mode come from each
        # include object. (Standalone runs in the gated unity-tests-standalone job.)
        include: ${{ fromJSON(needs.matrix-config.outputs.matrix-include) }}
    steps:
      - name: Enable Git long paths
        shell: powershell
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/uh-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v7
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/uh-gitconfig
        with:
          lfs: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list: the same
      # asmdef-discovery.js module the local discovery uses. Extracted into a
      # composite action so all Unity workflows share one implementation.
      # Uses Windows PowerShell inside the composite so empty legs can be skipped
      # before runner maintenance installs or repairs PowerShell 7 / Unity.
      - name: Compute test assembly list
        id: compute
        uses: ./.github/actions/compute-unity-assemblies
        with:
          target: "${{ matrix.test-mode }}"
          runtime-only: "${{ matrix.test-mode == 'standalone' && 'true' || 'false' }}"
          # Run the DI-container integration suites (Reflex / VContainer / Zenject)
          # alongside core on EVERY version x mode leg. The matching run step passes
          # -IncludeIntegrations so the 3 packages are installed into the ephemeral
          # manifest; without that the integration assemblies would not compile.
          include-integrations: "true"

      - name: Maintain Unity editor on selected runner
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 360
        shell: powershell
        run: |
          $artifactsPath = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $maintenanceDiagnosticsRoot = Join-Path $artifactsPath 'provisioning/runner-maintenance'
          New-Item -ItemType Directory -Force -Path $maintenanceDiagnosticsRoot | Out-Null
          $provisioningProfile = if ('${{ matrix.test-mode }}' -eq 'standalone') {
            'StandaloneWindowsIl2Cpp'
          } else {
            'EditorOnly'
          }
          $maintenanceScript = Join-Path $env:GITHUB_WORKSPACE 'scripts\unity\maintain-windows-runner.ps1'
          if (-not (Test-Path -LiteralPath $maintenanceScript -PathType Leaf)) {
            throw "Runner maintenance script not found: $maintenanceScript"
          }
          . $maintenanceScript
          $maintenanceExitCode = Invoke-WindowsRunnerMaintenance `
            -UnityVersions '${{ matrix.unity-version }}' `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsRoot $maintenanceDiagnosticsRoot
          if ($maintenanceExitCode -ne 0) {
            throw "Runner maintenance failed with exit code $maintenanceExitCode."
          }
          $pwshCandidates = @(
            (Join-Path $env:ProgramFiles 'PowerShell\7\pwsh.exe'),
            $(if (${env:ProgramFiles(x86)}) { Join-Path ${env:ProgramFiles(x86)} 'PowerShell\7\pwsh.exe' })
          )
          $pathPwsh = Get-Command pwsh -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -First 1
          if ($pathPwsh -and $pathPwsh -notlike '*\Microsoft\WindowsApps\pwsh.exe') {
            $pwshCandidates += $pathPwsh
          }
          $pwshCandidates = @(
            $pwshCandidates |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Select-Object -Unique
          )
          $pwshPath = @($pwshCandidates | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf })[0]
          if (-not $pwshPath) {
            throw 'PowerShell 7 maintenance completed, but pwsh.exe was not found for later GitHub Actions steps.'
          }
          $pwshDirectory = Split-Path -Parent $pwshPath
          $pwshDirectory | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "Added PowerShell 7 to GITHUB_PATH: $pwshDirectory"

      - name: Print runner diagnostics
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        # Composite action runs PowerShell internally; `shell: bash` on a
        # self-hosted Windows runner can resolve to the WSL stub at
        # C:\Windows\System32\bash.exe and fail with "Windows Subsystem
        # for Linux has no installed distributions." Never use plain
        # `shell: bash` on self-hosted Windows runners.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "default (organization lock wraps the Unity section)"

      - name: Cache Unity Library and package caches
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: actions/cache@v6
        env:
          PACKAGE_HASH: >-
            ${{ hashFiles(
              'package.json',
              'Runtime/**',
              'Editor/**',
              'Tests/**',
              'scripts/unity/run-ci-tests.ps1',
              'scripts/unity/lib/asmdef-discovery.js',
              '.github/actions/compute-unity-assemblies/action.yml',
              '.github/integration-packages.json'
            ) }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          # The `-default-` scope token keeps this prefix DISJOINT from the
          # single-threaded job's `-single-threaded-` key so the restore-keys
          # fallback can never cross-restore a SINGLE_THREADED-compiled Library
          # into a default leg. restore-keys lets a test-only PR (different
          # PACKAGE_HASH) warm-restore the prior run's imported Library instead of
          # importing cold.
          key: Library-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-default-${{ env.PACKAGE_HASH }}
          restore-keys: |
            Library-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-default-

      - name: Validate Unity license secrets
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # Skip provisioning, the org lock, and the run when no unity-helpers test
      # assembly matched this target (compute step resolved an empty list). The
      # verify step runs only after compute succeeds and is told the run was an
      # expected skip via the expected-empty input. This never triggers for the
      # current asmdef set; it is the robustness path for a target with no
      # matching assemblies. If checkout/cache/setup fails before compute, let
      # that setup failure stand on its own instead of adding a misleading
      # "tests did not run" annotation for a Unity run that never started.
      - name: Provision Unity Editor
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $provisioningProfile = if ('${{ matrix.test-mode }}' -eq 'standalone') {
            'StandaloneWindowsIl2Cpp'
          } else {
            'EditorOnly'
          }
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Acquire organization Unity lock
        id: unity_lock
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
          runner-id: ${{ runner.name }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Run Unity Test Runner
        id: run_tests
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        # Per-mode timeout. 150: ONLY the standalone leg needs it -- it builds a
        # NON-development IL2CPP player with the Release C++ configuration, and a
        # run-ci-tests.ps1 change rotates the Library cache key, so first runs
        # build cold. editmode/playmode are in-editor runs whose healthy worst case
        # is the ~40-min SINGLE_THREADED EditMode baseline, so 90 gives >2x headroom
        # yet fails a hang ~60 min sooner than the old blanket 150 (a dead Unity
        # Accelerator once stalled EditMode for the full 150 and produced no
        # results.xml). All values stay under the job timeout (1200) so the step
        # clock fires first and releases the shared Unity seat.
        timeout-minutes: ${{ (matrix.test-mode == 'standalone' && 150) || 90 }}
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
          UH_UNITY_TEST_CATEGORY: "!Performance;!Stress"
          # Stream per-test results to unity.log as each test finishes (editor-side
          # CiTestResultStreamLogger). When a PlayMode run aborts/reloads mid-run and
          # serializes a misleading total=0 results.xml, the streamed lines still name
          # the last test that ran -- the key to diagnosing the total=0 legs.
          UH_STREAM_TEST_RESULTS: "1"
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:UH_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}' `
            -IncludeIntegrations `
            -ReleaseCodeOptimization `
            -ReleasePlayerBuild `
            -Il2CppCompilerConfiguration '${{ matrix.test-mode == 'standalone' && 'Debug' || 'Release' }}'

      # Surface the slowest fixtures/cases every run (the measurement backbone for
      # keeping the suite fast). Warn at 120s/fixture; add -FailOverBudget once the
      # budget is tight enough to enforce as a hard wall-clock gate.
      - name: Report slowest tests
        if: ${{ always() && steps.compute.outputs.is-empty != 'true' }}
        shell: pwsh
        run: |
          $results = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}/results.xml'
          if (Test-Path -LiteralPath $results) {
            ./scripts/unity/report-slow-tests.ps1 -ResultsPath $results -Top 30 -FixtureBudgetSeconds 120 -StepSummary
          } else {
            Write-Host "::notice::No results.xml at $results to report slow tests."
          }

      - name: Return Unity license
        id: return_unity_license
        if: ${{ always() && steps.unity_lock.outcome == 'success' }}
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: ${{ runner.temp }}/unity-return-${{ matrix.unity-version }}-${{ matrix.test-mode }}.log
          prior-command-succeeded: ${{ steps.run_tests.outcome == 'success' }}
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: ${{ always() && (steps.unity_lock.outcome == 'success' || steps.unity_lock.outcome == 'failure' || steps.unity_lock.outcome == 'cancelled') }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      # CANCELLATION + TIMEOUT DIAGNOSTIC: when Unity hangs in csc the runner
      # step times out (or the operator cancels), and the verify step below
      # skips -- so its catastrophic-pattern scan never fires either. This step
      # covers both failure() AND cancelled() so the operator has SOMETHING to
      # look at in the GitHub summary (the tail of unity.log + any catastrophic
      # patterns the partial log happened to surface). Best-effort: never fails
      # the job, no-ops when unity.log doesn't exist (cancellation before Unity
      # launched).
      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      # CLASS GUARD: Unity can fail before NUnit writes results. The shared
      # composite fails unless a results XML exists AND reports total > 0.
      # Skip on cancellation so a user-cancelled run does not emit the
      # generic "tests did not run" annotation -- the cancellation itself
      # is the explanation. Also skip if setup/provisioning/lock work failed
      # before the Unity run step attempted; that earlier failure is then the
      # actionable signal. The guard still runs for intentional empty targets,
      # after a Unity-run failure (to surface "tests did not run" /
      # catastrophic-compile diagnostics), and on success (to confirm a real
      # result XML exists).
      - name: Verify tests actually ran
        if: >-
          ${{
            !cancelled() &&
            steps.compute.outcome == 'success' &&
            (steps.compute.outputs.is-empty == 'true' || steps.run_tests.outcome != 'skipped')
          }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}
          expected-empty: ${{ steps.compute.outputs.is-empty }}

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 14

  # GATED STANDALONE tier: the expensive IL2CPP player legs. `needs: unity-tests`
  # means any failure in the fast tier (a compile error in an editmode leg, a mass
  # runtime failure in any editmode/playmode leg) SKIPS this whole job -- the
  # ~30-min-each standalone builds never start on a fundamentally-broken PR. On a
  # green fast tier this runs exactly as before; because the org build-lock
  # serializes every leg onto the one Unity seat, standalone already ran last, so
  # gating it costs zero wall-clock. The steps are intentionally identical to
  # unity-tests -- the `matrix.test-mode == 'standalone'` inline conditionals select
  # the IL2CPP provisioning profile, Debug C++ config, and 150-min timeout, and
  # matrix.test-mode is always 'standalone' here. The `!= '[]'` if-guard skips the
  # job (instead of erroring on an empty matrix) for single-mode dispatch pins,
  # which run entirely in the fast tier.
  unity-tests-standalone:
    name: Unity standalone (gated)
    needs:
      - matrix-config
      - runner-preflight
      - unity-tests
    if: >-
      ${{
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected) &&
        needs.matrix-config.outputs.has-required-secrets == 'true' &&
        needs.matrix-config.outputs.matrix-include-standalone != '[]'
      }}
    environment: unity-license
    runs-on: [self-hosted, Windows, RAM-64GB]
    timeout-minutes: 1200
    strategy:
      fail-fast: ${{ github.event_name == 'workflow_dispatch' && inputs.abort-on-first-failure == 'true' }}
      max-parallel: 2
      matrix:
        # Standalone-tier include from matrix-config (empty -> this job is skipped
        # by the if-guard above -- single-mode dispatch pins run in the fast tier).
        include: ${{ fromJSON(needs.matrix-config.outputs.matrix-include-standalone) }}
    steps:
      - name: Enable Git long paths
        shell: powershell
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/uh-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v7
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/uh-gitconfig
        with:
          lfs: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      # Single source of truth for the assembly include list: the same
      # asmdef-discovery.js module the local discovery uses. Extracted into a
      # composite action so all Unity workflows share one implementation.
      # Uses Windows PowerShell inside the composite so empty legs can be skipped
      # before runner maintenance installs or repairs PowerShell 7 / Unity.
      - name: Compute test assembly list
        id: compute
        uses: ./.github/actions/compute-unity-assemblies
        with:
          target: "${{ matrix.test-mode }}"
          runtime-only: "${{ matrix.test-mode == 'standalone' && 'true' || 'false' }}"
          # Run the DI-container integration suites (Reflex / VContainer / Zenject)
          # alongside core on EVERY version x mode leg. The matching run step passes
          # -IncludeIntegrations so the 3 packages are installed into the ephemeral
          # manifest; without that the integration assemblies would not compile.
          include-integrations: "true"

      - name: Maintain Unity editor on selected runner
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 360
        shell: powershell
        run: |
          $artifactsPath = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $maintenanceDiagnosticsRoot = Join-Path $artifactsPath 'provisioning/runner-maintenance'
          New-Item -ItemType Directory -Force -Path $maintenanceDiagnosticsRoot | Out-Null
          $provisioningProfile = if ('${{ matrix.test-mode }}' -eq 'standalone') {
            'StandaloneWindowsIl2Cpp'
          } else {
            'EditorOnly'
          }
          $maintenanceScript = Join-Path $env:GITHUB_WORKSPACE 'scripts\unity\maintain-windows-runner.ps1'
          if (-not (Test-Path -LiteralPath $maintenanceScript -PathType Leaf)) {
            throw "Runner maintenance script not found: $maintenanceScript"
          }
          . $maintenanceScript
          $maintenanceExitCode = Invoke-WindowsRunnerMaintenance `
            -UnityVersions '${{ matrix.unity-version }}' `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsRoot $maintenanceDiagnosticsRoot
          if ($maintenanceExitCode -ne 0) {
            throw "Runner maintenance failed with exit code $maintenanceExitCode."
          }
          $pwshCandidates = @(
            (Join-Path $env:ProgramFiles 'PowerShell\7\pwsh.exe'),
            $(if (${env:ProgramFiles(x86)}) { Join-Path ${env:ProgramFiles(x86)} 'PowerShell\7\pwsh.exe' })
          )
          $pathPwsh = Get-Command pwsh -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -First 1
          if ($pathPwsh -and $pathPwsh -notlike '*\Microsoft\WindowsApps\pwsh.exe') {
            $pwshCandidates += $pathPwsh
          }
          $pwshCandidates = @(
            $pwshCandidates |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Select-Object -Unique
          )
          $pwshPath = @($pwshCandidates | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf })[0]
          if (-not $pwshPath) {
            throw 'PowerShell 7 maintenance completed, but pwsh.exe was not found for later GitHub Actions steps.'
          }
          $pwshDirectory = Split-Path -Parent $pwshPath
          $pwshDirectory | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "Added PowerShell 7 to GITHUB_PATH: $pwshDirectory"

      - name: Print runner diagnostics
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        # Composite action runs PowerShell internally; `shell: bash` on a
        # self-hosted Windows runner can resolve to the WSL stub at
        # C:\Windows\System32\bash.exe and fail with "Windows Subsystem
        # for Linux has no installed distributions." Never use plain
        # `shell: bash` on self-hosted Windows runners.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "gated standalone (organization lock wraps the Unity section)"

      - name: Cache Unity Library and package caches
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: actions/cache@v6
        env:
          PACKAGE_HASH: >-
            ${{ hashFiles(
              'package.json',
              'Runtime/**',
              'Editor/**',
              'Tests/**',
              'scripts/unity/run-ci-tests.ps1',
              'scripts/unity/lib/asmdef-discovery.js',
              '.github/actions/compute-unity-assemblies/action.yml',
              '.github/integration-packages.json'
            ) }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          # The `-default-` scope token keeps this prefix DISJOINT from the
          # single-threaded job's `-single-threaded-` key so the restore-keys
          # fallback can never cross-restore a SINGLE_THREADED-compiled Library
          # into a default leg. restore-keys lets a test-only PR (different
          # PACKAGE_HASH) warm-restore the prior run's imported Library instead of
          # importing cold.
          key: Library-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-default-${{ env.PACKAGE_HASH }}
          restore-keys: |
            Library-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-default-

      - name: Validate Unity license secrets
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      # Skip provisioning, the org lock, and the run when no unity-helpers test
      # assembly matched this target (compute step resolved an empty list). The
      # verify step runs only after compute succeeds and is told the run was an
      # expected skip via the expected-empty input. This never triggers for the
      # current asmdef set; it is the robustness path for a target with no
      # matching assemblies. If checkout/cache/setup fails before compute, let
      # that setup failure stand on its own instead of adding a misleading
      # "tests did not run" annotation for a Unity run that never started.
      - name: Provision Unity Editor
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $provisioningProfile = if ('${{ matrix.test-mode }}' -eq 'standalone') {
            'StandaloneWindowsIl2Cpp'
          } else {
            'EditorOnly'
          }
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Acquire organization Unity lock
        id: unity_lock
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
          runner-id: ${{ runner.name }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Run Unity Test Runner
        id: run_tests
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        # Per-mode timeout. 150: ONLY the standalone leg needs it -- it builds a
        # NON-development IL2CPP player with the Release C++ configuration, and a
        # run-ci-tests.ps1 change rotates the Library cache key, so first runs
        # build cold. editmode/playmode are in-editor runs whose healthy worst case
        # is the ~40-min SINGLE_THREADED EditMode baseline, so 90 gives >2x headroom
        # yet fails a hang ~60 min sooner than the old blanket 150 (a dead Unity
        # Accelerator once stalled EditMode for the full 150 and produced no
        # results.xml). All values stay under the job timeout (1200) so the step
        # clock fires first and releases the shared Unity seat.
        timeout-minutes: ${{ (matrix.test-mode == 'standalone' && 150) || 90 }}
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
          UH_UNITY_TEST_CATEGORY: "!Performance;!Stress"
          # Stream per-test results to unity.log as each test finishes (editor-side
          # CiTestResultStreamLogger). When a PlayMode run aborts/reloads mid-run and
          # serializes a misleading total=0 results.xml, the streamed lines still name
          # the last test that ran -- the key to diagnosing the total=0 legs.
          UH_STREAM_TEST_RESULTS: "1"
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:UH_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}' `
            -IncludeIntegrations `
            -ReleaseCodeOptimization `
            -ReleasePlayerBuild `
            -Il2CppCompilerConfiguration '${{ matrix.test-mode == 'standalone' && 'Debug' || 'Release' }}'

      # Surface the slowest fixtures/cases every run (the measurement backbone for
      # keeping the suite fast). Warn at 120s/fixture; add -FailOverBudget once the
      # budget is tight enough to enforce as a hard wall-clock gate.
      - name: Report slowest tests
        if: ${{ always() && steps.compute.outputs.is-empty != 'true' }}
        shell: pwsh
        run: |
          $results = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}/results.xml'
          if (Test-Path -LiteralPath $results) {
            ./scripts/unity/report-slow-tests.ps1 -ResultsPath $results -Top 30 -FixtureBudgetSeconds 120 -StepSummary
          } else {
            Write-Host "::notice::No results.xml at $results to report slow tests."
          }

      - name: Return Unity license
        id: return_unity_license
        if: ${{ always() && steps.unity_lock.outcome == 'success' }}
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: ${{ runner.temp }}/unity-return-${{ matrix.unity-version }}-${{ matrix.test-mode }}.log
          prior-command-succeeded: ${{ steps.run_tests.outcome == 'success' }}
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: ${{ always() && (steps.unity_lock.outcome == 'success' || steps.unity_lock.outcome == 'failure' || steps.unity_lock.outcome == 'cancelled') }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      # CANCELLATION + TIMEOUT DIAGNOSTIC: when Unity hangs in csc the runner
      # step times out (or the operator cancels), and the verify step below
      # skips -- so its catastrophic-pattern scan never fires either. This step
      # covers both failure() AND cancelled() so the operator has SOMETHING to
      # look at in the GitHub summary (the tail of unity.log + any catastrophic
      # patterns the partial log happened to surface). Best-effort: never fails
      # the job, no-ops when unity.log doesn't exist (cancellation before Unity
      # launched).
      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}

      # CLASS GUARD: Unity can fail before NUnit writes results. The shared
      # composite fails unless a results XML exists AND reports total > 0.
      # Skip on cancellation so a user-cancelled run does not emit the
      # generic "tests did not run" annotation -- the cancellation itself
      # is the explanation. Also skip if setup/provisioning/lock work failed
      # before the Unity run step attempted; that earlier failure is then the
      # actionable signal. The guard still runs for intentional empty targets,
      # after a Unity-run failure (to surface "tests did not run" /
      # catastrophic-compile diagnostics), and on success (to confirm a real
      # result XML exists).
      - name: Verify tests actually ran
        if: >-
          ${{
            !cancelled() &&
            steps.compute.outcome == 'success' &&
            (steps.compute.outputs.is-empty == 'true' || steps.run_tests.outcome != 'skipped')
          }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          label: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }}
          expected-empty: ${{ steps.compute.outputs.is-empty }}

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-${{ matrix.unity-version }}-${{ matrix.test-mode }}
          path: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}
          if-no-files-found: warn
          retention-days: 14

  # SINGLE_THREADED leg. The default matrix never exercises the SINGLE_THREADED
  # code paths (Runtime/Core/DataStructure/Cache.cs et al. gate thread-safe vs
  # single-threaded behavior on `#if SINGLE_THREADED`, OFF by default). This job
  # builds+tests with SINGLE_THREADED (and WALLSTOP_CONCAVE_HULL_STATS) defined as
  # GLOBAL scripting symbols so EVERY asmdef test assembly compiles the
  # single-threaded path. Restricted to Unity 6 (6000.3.16f1) editmode+playmode to
  # keep time small (no IL2CPP standalone build). Core-only (no integrations): the
  # single-threaded toggle is a core-runtime concern, so installing the DI packages
  # would only add cost. It is a SEPARATE job from unity-tests but shares the SAME
  # self-hosted Unity seat. This job depends on both Unity tiers so same-workflow
  # jobs do not contend with each other for the org lock; the external
  # `wallstop-organization-builds` lock still serializes this work against other
  # workflows and runs. Reuses the same secrets gate, runner-preflight,
  # provisioning, perf-category exclusion, verify-results, and artifact-upload
  # scaffolding as unity-tests, with DISTINCT project/Library/artifact paths
  # (suffix `-single-threaded`) so its differently-compiled Library never collides
  # with or poisons the default matrix's `6000.3.16f1-{mode}` cache.
  unity-tests-single-threaded:
    name: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }} (SINGLE_THREADED)
    needs:
      - matrix-config
      - runner-preflight
      - unity-tests
      - unity-tests-standalone
    if: >-
      ${{
        always() &&
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected) &&
        needs.matrix-config.result == 'success' &&
        needs.runner-preflight.result == 'success' &&
        needs.unity-tests.result == 'success' &&
        (needs.unity-tests-standalone.result == 'success' ||
          needs.unity-tests-standalone.result == 'skipped') &&
        needs.matrix-config.outputs.has-required-secrets == 'true'
      }}
    environment: unity-license
    runs-on: [self-hosted, Windows, RAM-64GB]
    timeout-minutes: 1200
    strategy:
      # See the unity-tests job: default false for full visibility;
      # workflow_dispatch can opt into abort-on-first-failure.
      fail-fast: ${{ github.event_name == 'workflow_dispatch' && inputs.abort-on-first-failure == 'true' }}
      max-parallel: 2
      matrix:
        # Unity 6 ONLY (6000.3.16f1) to keep the extra leg cheap. editmode + playmode
        # only -- both are fast in-editor runs; the SINGLE_THREADED path does not need
        # a standalone IL2CPP player build to be exercised.
        unity-version: ["6000.3.16f1"]
        test-mode: ["editmode", "playmode"]
    steps:
      - name: Enable Git long paths
        shell: powershell
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/uh-gitconfig
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v7
        env:
          GIT_CONFIG_GLOBAL: ${{ runner.temp }}/uh-gitconfig
        with:
          lfs: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Compute test assembly list
        id: compute
        uses: ./.github/actions/compute-unity-assemblies
        with:
          target: "${{ matrix.test-mode }}"
          runtime-only: "false"

      - name: Maintain Unity editor on selected runner
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 360
        shell: powershell
        run: |
          $artifactsPath = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded'
          $maintenanceDiagnosticsRoot = Join-Path $artifactsPath 'provisioning/runner-maintenance'
          New-Item -ItemType Directory -Force -Path $maintenanceDiagnosticsRoot | Out-Null
          $provisioningProfile = 'EditorOnly'
          $maintenanceScript = Join-Path $env:GITHUB_WORKSPACE 'scripts\unity\maintain-windows-runner.ps1'
          if (-not (Test-Path -LiteralPath $maintenanceScript -PathType Leaf)) {
            throw "Runner maintenance script not found: $maintenanceScript"
          }
          . $maintenanceScript
          $maintenanceExitCode = Invoke-WindowsRunnerMaintenance `
            -UnityVersions '${{ matrix.unity-version }}' `
            -ProvisioningProfile $provisioningProfile `
            -DiagnosticsRoot $maintenanceDiagnosticsRoot
          if ($maintenanceExitCode -ne 0) {
            throw "Runner maintenance failed with exit code $maintenanceExitCode."
          }
          $pwshCandidates = @(
            (Join-Path $env:ProgramFiles 'PowerShell\7\pwsh.exe'),
            $(if (${env:ProgramFiles(x86)}) { Join-Path ${env:ProgramFiles(x86)} 'PowerShell\7\pwsh.exe' })
          )
          $pathPwsh = Get-Command pwsh -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -First 1
          if ($pathPwsh -and $pathPwsh -notlike '*\Microsoft\WindowsApps\pwsh.exe') {
            $pwshCandidates += $pathPwsh
          }
          $pwshCandidates = @(
            $pwshCandidates |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Select-Object -Unique
          )
          $pwshPath = @($pwshCandidates | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf })[0]
          if (-not $pwshPath) {
            throw 'PowerShell 7 maintenance completed, but pwsh.exe was not found for later GitHub Actions steps.'
          }
          $pwshDirectory = Split-Path -Parent $pwshPath
          $pwshDirectory | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "Added PowerShell 7 to GITHUB_PATH: $pwshDirectory"

      - name: Print runner diagnostics
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        # Composite action runs PowerShell internally; `shell: bash` on a
        # self-hosted Windows runner can resolve to the WSL stub and fail. Never
        # use plain `shell: bash` on self-hosted Windows runners.
        uses: ./.github/actions/print-self-hosted-runner-diagnostics
        with:
          matrix-note: "single-threaded (organization lock wraps the Unity section)"

      - name: Cache Unity Library and package caches
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: actions/cache@v6
        env:
          PACKAGE_HASH: >-
            ${{ hashFiles(
              'package.json',
              'Runtime/**',
              'Editor/**',
              'Tests/**',
              'scripts/unity/run-ci-tests.ps1',
              'scripts/unity/lib/asmdef-discovery.js',
              '.github/actions/compute-unity-assemblies/action.yml',
              '.github/integration-packages.json'
            ) }}
        with:
          path: |
            .artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded/Library
            .artifacts/unity/cache/${{ matrix.unity-version }}
          # `single-threaded` in BOTH the project path above and this key keeps this
          # leg's Library (compiled WITH SINGLE_THREADED) separate from the default
          # matrix's `6000.3.16f1-{mode}` Library (compiled WITHOUT it). The
          # restore-keys prefix carries the same `-single-threaded-` token so it can
          # only ever fall back to other SINGLE_THREADED Libraries.
          key: Library-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded-${{ env.PACKAGE_HASH }}
          restore-keys: |
            Library-${{ runner.os }}-${{ runner.arch }}-${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded-

      - name: Validate Unity license secrets
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Provision Unity Editor
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        timeout-minutes: 180
        shell: pwsh
        run: |
          $artifactsPath = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded'
          $diagnosticsPath = Join-Path $artifactsPath 'provisioning'
          $diagnosticsFile = Join-Path $diagnosticsPath 'ensure-editor-summary.json'
          New-Item -ItemType Directory -Force -Path $diagnosticsPath | Out-Null
          $editor = ./scripts/unity/ensure-editor.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -CiManagedOnly `
            -RequireHealthyExisting `
            -ProvisioningProfile 'EditorOnly' `
            -DiagnosticsPath $diagnosticsFile
          "UNITY_EDITOR_PATH=$editor" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unity provisioning diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-provisioning-${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded
          path: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded/provisioning
          if-no-files-found: warn
          retention-days: 14

      - name: Acquire organization Unity lock
        id: unity_lock
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded
          runner-id: ${{ runner.name }}
          timeout-minutes: "300"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Run Unity Test Runner
        id: run_tests
        if: ${{ steps.compute.outputs.is-empty != 'true' }}
        # This job is editmode + playmode ONLY (no standalone IL2CPP build), so 90
        # min -- >2x the ~40-min healthy SINGLE_THREADED EditMode baseline -- is the
        # fail-fast cap. The old 150 let a dead-Accelerator EditMode stall burn the
        # full window and emit no results.xml; 90 surfaces that ~60 min sooner and
        # releases the shared Unity seat. Stays under the job timeout (1200).
        timeout-minutes: 90
        shell: pwsh
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_ACCELERATOR_ENDPOINT: ${{ secrets.UNITY_ACCELERATOR_ENDPOINT }}
          UH_UNITY_TEST_CATEGORY: "!Performance;!Stress"
          # Stream per-test results to unity.log as each test finishes (editor-side
          # CiTestResultStreamLogger). When a PlayMode run aborts/reloads mid-run and
          # serializes a misleading total=0 results.xml, the streamed lines still name
          # the last test that ran -- the key to diagnosing the total=0 legs.
          UH_STREAM_TEST_RESULTS: "1"
        run: |
          ./scripts/unity/run-ci-tests.ps1 `
            -UnityVersion '${{ matrix.unity-version }}' `
            -TestMode '${{ matrix.test-mode }}' `
            -AssemblyNames $env:UH_TEST_ASSEMBLIES `
            -ArtifactsPath '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded' `
            -ProjectPath '.artifacts/unity/projects/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded' `
            -AdditionalScriptingDefines SINGLE_THREADED,WALLSTOP_CONCAVE_HULL_STATS `
            -ReleaseCodeOptimization `
            -ReleasePlayerBuild

      # Surface the slowest fixtures/cases for the SINGLE_THREADED leg (the 40-min
      # leg the optimization targets). Warn-only; see the main job's note.
      - name: Report slowest tests
        if: ${{ always() && steps.compute.outputs.is-empty != 'true' }}
        shell: pwsh
        run: |
          $results = '.artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded/results.xml'
          if (Test-Path -LiteralPath $results) {
            ./scripts/unity/report-slow-tests.ps1 -ResultsPath $results -Top 30 -FixtureBudgetSeconds 120 -StepSummary
          } else {
            Write-Host "::notice::No results.xml at $results to report slow tests."
          }

      - name: Return Unity license
        id: return_unity_license
        if: ${{ always() && steps.unity_lock.outcome == 'success' }}
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: ${{ runner.temp }}/unity-return-${{ matrix.unity-version }}-${{ matrix.test-mode }}.log
          prior-command-succeeded: ${{ steps.run_tests.outcome == 'success' }}
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: ${{ always() && (steps.unity_lock.outcome == 'success' || steps.unity_lock.outcome == 'failure' || steps.unity_lock.outcome == 'cancelled') }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: ${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Dump Unity log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded
          label: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }} (SINGLE_THREADED)

      - name: Verify tests actually ran
        if: >-
          ${{
            !cancelled() &&
            steps.compute.outcome == 'success' &&
            (steps.compute.outputs.is-empty == 'true' || steps.run_tests.outcome != 'skipped')
          }}
        uses: ./.github/actions/verify-unity-results
        with:
          results-dir: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded
          label: Unity ${{ matrix.unity-version }} ${{ matrix.test-mode }} (SINGLE_THREADED)
          expected-empty: ${{ steps.compute.outputs.is-empty }}

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unity-${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded
          path: .artifacts/unity/${{ matrix.unity-version }}-${{ matrix.test-mode }}-single-threaded
          if-no-files-found: warn
          retention-days: 14

  unitypackage-smoke:
    name: Unity package export smoke
    needs:
      - matrix-config
      - runner-preflight
      - unity-tests
      - unity-tests-standalone
      - unity-tests-single-threaded
    if: >-
      ${{
        always() &&
        (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository) &&
        (github.event_name != 'push' || github.ref_protected) &&
        needs.matrix-config.result == 'success' &&
        needs.runner-preflight.result == 'success' &&
        needs.unity-tests.result == 'success' &&
        (needs.unity-tests-standalone.result == 'success' ||
          needs.unity-tests-standalone.result == 'skipped') &&
        needs.unity-tests-single-threaded.result == 'success' &&
        needs.matrix-config.outputs.has-required-secrets == 'true'
      }}
    environment: unity-license
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Validate Unity license secrets
        uses: ./.github/actions/validate-unity-license
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Acquire organization Unity lock
        id: unity_lock
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/acquire-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: unitypackage-smoke-${{ github.run_id }}
          runner-id: ${{ runner.name }}
          timeout-minutes: "210"
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Export Unity package smoke artifact
        id: export_unitypackage
        timeout-minutes: 120
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          set -euo pipefail
          UNITY_VERSION="$(jq -r '.release' .github/unity-versions.json)"
          export UNITY_VERSION
          package_name="$(jq -r '.name // empty' package.json)"
          package_version="$(jq -r '.version // empty' package.json)"
          output=".artifacts/unitypackage-smoke/${package_name}-${package_version}.unitypackage"
          bash scripts/unity/export-unitypackage.sh \
            --project-dir ".artifacts/unity/unitypackage-smoke-project" \
            --output "${output}"

      - name: Return Unity license
        id: return_unity_license
        if: ${{ always() && steps.unity_lock.outcome == 'success' }}
        timeout-minutes: 5
        continue-on-error: true
        uses: ./.github/actions/return-unity-license
        with:
          prior-return-log-path: .artifacts/unity/unitypackage-smoke-project/unitypackage-output/unity.log
          prior-command-succeeded: ${{ steps.export_unitypackage.outcome == 'success' }}
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Release organization Unity lock
        if: ${{ always() && (steps.unity_lock.outcome == 'success' || steps.unity_lock.outcome == 'failure' || steps.unity_lock.outcome == 'cancelled') }}
        uses: Ambiguous-Interactive/ambiguous-organization-build-lock/.github/actions/release-build-lock@cfdcf6e67d7720824d21c37aa6a8b9e70dbdd2af
        with:
          lock-name: wallstop-organization-builds
          holder-id-suffix: unitypackage-smoke-${{ github.run_id }}
          runner-id: ${{ runner.name }}
          resource-cleanup-status: ${{ steps.return_unity_license.outputs.resource-cleanup-status }}
          resource-health: ${{ steps.return_unity_license.outputs.resource-health }}
          resource-reason: ${{ steps.return_unity_license.outputs.resource-reason }}
        env:
          BUILD_LOCK_APP_ID: ${{ secrets.BUILD_LOCK_APP_ID }}
          BUILD_LOCK_APP_PRIVATE_KEY: ${{ secrets.BUILD_LOCK_APP_PRIVATE_KEY }}

      - name: Dump Unity export log tail on failure or cancellation
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/dump-unity-log-tail
        with:
          results-dir: .artifacts/unity/unitypackage-smoke-project/unitypackage-output
          label: Unity package export smoke

      - name: Upload Unity package export smoke diagnostics
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: unitypackage-smoke-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .artifacts/unity/unitypackage-smoke-project/Assets/Editor/UnityHelpersPackageExporter.cs
            .artifacts/unity/unitypackage-smoke-project/Packages/manifest.json
            .artifacts/unity/unitypackage-smoke-project/ProjectSettings/
            .artifacts/unity/unitypackage-smoke-project/unitypackage-output/*.log
          if-no-files-found: warn
          retention-days: 14
          overwrite: true
